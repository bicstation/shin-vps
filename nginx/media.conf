server {
    listen 80;

    location /media/ {
        alias /usr/src/app/media/;

        access_log /dev/stdout;
        error_log  /dev/stderr;

        try_files $uri =404;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}curl -H "Host: tiper.live" http://localhost/media/products/0d9d4010-29a7-4e5e-a041-7ef85e542e91.png