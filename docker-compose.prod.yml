# =====================================================================
# 🚀 SHIN-VPS 本番環境構成定義 (SSL対応・4ドメイン・WordPress3サイト)
# ---------------------------------------------------------------------
# 【AI 厳命事項】
# 1. サービス名/コンテナ名の変更は一切禁止。
# 2. フロントエンドの build context は shared 参照のためルート(.)に設定。
# 3. NEXT_PUBLIC_BASE_PATH は必ず空("")に設定。
# 4. WordPressは用途別に3つ(gen, saving, adult)を独立稼働させる。
# =====================================================================

services:

  # ---------------------------------------------------------------------
  # 0. Traefik (エッジプロキシ / SSL終端)
  # ---------------------------------------------------------------------
  traefik:
    image: traefik:v2.11
    container_name: traefik-proxy
    restart: always
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${SSL_EMAIL:-bicstation@gmail.com}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shin-vps_shared-proxy"
      - "traefik.http.routers.traefik-dash.rule=Host(`dashboard.tiper.live`)"
      - "traefik.http.routers.traefik-dash.entrypoints=websecure"
      - "traefik.http.routers.traefik-dash.tls.certresolver=le"
      - "traefik.http.routers.traefik-dash.service=api@internal"
      - "traefik.http.routers.traefik-dash.priority=4000"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/maya/docker_volumes/traefik/acme.json:/letsencrypt/acme.json
    networks:
      - shared-proxy

  # ---------------------------------------------------------------------
  # 0.5 Ofelia (ジョブスケジューラ)
  # ---------------------------------------------------------------------
  scheduler:
    image: mcuadros/ofelia:latest
    container_name: bicstation-scheduler
    restart: always
    depends_on:
      - django-v2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - shared-proxy
    command: daemon --docker

  # ---------------------------------------------------------------------
  # 1. データベース層 (Postgres / MariaDB)
  # ---------------------------------------------------------------------
  postgres-db-v2:
    image: postgres:15-alpine
    container_name: postgres-db-v2
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - /home/maya/docker_volumes/postgres:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  mariadb-v2:
    image: mariadb:10
    container_name: mariadb-v2
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${WP_DB_NAME}
      MARIADB_USER: ${WP_DB_USER}
      MARIADB_PASSWORD: ${WP_DB_PASSWORD}
    volumes:
      - /home/maya/docker_volumes/mysql:/var/lib/mysql
    networks:
      - internal-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MARIADB_USER", "-p$$MARIADB_PASSWORD"]
      interval: 10s
      retries: 3

  # ---------------------------------------------------------------------
  # 2. バックエンド層 (Django API - 10連APIキー注入)
  # ---------------------------------------------------------------------
  django-v2:
    build: { context: ./django }
    container_name: django-v2
    restart: always
    depends_on:
      postgres-db-v2:
        condition: service_healthy
    env_file: [.env]
    environment:
      - DB_HOST=postgres-db-v2
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_KEY_1=${GEMINI_API_KEY_1}
      - GEMINI_API_KEY_2=${GEMINI_API_KEY_2}
      - GEMINI_API_KEY_3=${GEMINI_API_KEY_3}
      - GEMINI_API_KEY_4=${GEMINI_API_KEY_4}
      - GEMINI_API_KEY_5=${GEMINI_API_KEY_5}
      - GEMINI_API_KEY_6=${GEMINI_API_KEY_6}
      - GEMINI_API_KEY_7=${GEMINI_API_KEY_7}
      - GEMINI_API_KEY_8=${GEMINI_API_KEY_8}
      - GEMINI_API_KEY_9=${GEMINI_API_KEY_9}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shin-vps_shared-proxy"
      - "traefik.http.routers.django-router.rule=Host(`tiper.live`, `bic-saving.com`, `bicstation.com`, `avflash.xyz`) && (PathPrefix(`/admin`) || PathPrefix(`/api`) || PathPrefix(`/static`))"
      - "traefik.http.routers.django-router.entrypoints=websecure"
      - "traefik.http.routers.django-router.tls.certresolver=le"
      - "traefik.http.routers.django-router.priority=2000"
      - "traefik.http.services.django-svc.loadbalancer.server.port=8000"
      - "ofelia.enabled=true"
      - "ofelia.job-exec.ai_blog_post.schedule=0 */30 * * * *"
      - "ofelia.job-exec.ai_blog_post.command=python manage.py ai_blog_from_db"
      - "ofelia.job-exec.ai_rss_news_post.schedule=0 15 */2 * * *"
      - "ofelia.job-exec.ai_rss_news_post.command=python manage.py ai_post_pc_news"
    volumes:
      - ./django:/usr/src/app
      - static_volume_prod:/usr/src/app/staticfiles
    networks:
      - internal-net
      - shared-proxy

  # ---------------------------------------------------------------------
  # 3. フロントエンド層 (Next.js 4ドメイン完全独立)  
  # ---------------------------------------------------------------------
  next-bicstation-v2:
    build: 
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-bicstation
        NEXT_PUBLIC_API_URL: https://bicstation.com/api
        NEXT_PUBLIC_BASE_PATH: ""
    container_name: next-bicstation-v2
    restart: always
    env_file: [.env]
    volumes:
      - ./next-bicstation:/usr/src/app
      - ./shared:/usr/src/app/shared 
      - sitemap_data:/app/public/sitemap_gen
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shin-vps_shared-proxy"
      - "traefik.http.routers.bicstation-router.rule=Host(`bicstation.com`)"
      - "traefik.http.routers.bicstation-router.entrypoints=websecure"
      - "traefik.http.routers.bicstation-router.tls.certresolver=le"
      - "traefik.http.routers.bicstation-router.priority=100"
      - "traefik.http.services.bicstation-svc.loadbalancer.server.port=3000"
    networks:
      - internal-net
      - shared-proxy

  next-tiper-v2:
    build: 
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-tiper
        NEXT_PUBLIC_API_URL: https://tiper.live/api
        NEXT_PUBLIC_BASE_PATH: ""
    container_name: next-tiper-v2
    restart: always
    env_file: [.env]
    volumes:
      - ./next-tiper:/usr/src/app
      - ./shared:/usr/src/app/shared
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shin-vps_shared-proxy"
      - "traefik.http.routers.tiper-router.rule=Host(`tiper.live`)"
      - "traefik.http.routers.tiper-router.entrypoints=websecure"
      - "traefik.http.routers.tiper-router.tls.certresolver=le"
      - "traefik.http.routers.tiper-router.priority=100"
      - "traefik.http.services.tiper-svc.loadbalancer.server.port=3000"
    networks:
      - internal-net
      - shared-proxy

  next-bic-saving-v2:
    build: 
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-bic-saving
        NEXT_PUBLIC_API_URL: https://bic-saving.com/api
        NEXT_PUBLIC_BASE_PATH: ""
    container_name: next-bic-saving-v2
    restart: always
    env_file: [.env]
    volumes:
      - ./next-bic-saving:/usr/src/app
      - ./shared:/usr/src/app/shared
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shin-vps_shared-proxy"
      - "traefik.http.routers.saving-router.rule=Host(`bic-saving.com`)"
      - "traefik.http.routers.saving-router.entrypoints=websecure"
      - "traefik.http.routers.saving-router.tls.certresolver=le"
      - "traefik.http.routers.saving-router.priority=100"
      - "traefik.http.services.saving-svc.loadbalancer.server.port=3000"
    networks:
      - internal-net
      - shared-proxy

  next-avflash-v2:
    build: 
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-avflash
        NEXT_PUBLIC_API_URL: https://avflash.xyz/api
        NEXT_PUBLIC_BASE_PATH: ""
    container_name: next-avflash-v2
    restart: always
    env_file: [.env]
    volumes:
      - ./next-avflash:/usr/src/app
      - ./shared:/usr/src/app/shared
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shin-vps_shared-proxy"
      - "traefik.http.routers.avflash-router.rule=Host(`avflash.xyz`)"
      - "traefik.http.routers.avflash-router.entrypoints=websecure"
      - "traefik.http.routers.avflash-router.tls.certresolver=le"
      - "traefik.http.routers.avflash-router.priority=100"
      - "traefik.http.services.avflash-svc.loadbalancer.server.port=3000"
    networks:
      - internal-net
      - shared-proxy

  # ---------------------------------------------------------------------
  # 4. ブログ層 (WordPress 3サイト独立運用)
  # ---------------------------------------------------------------------

  wordpress-gen:
    image: wordpress:6-fpm-alpine
    container_name: wordpress-gen-v2
    restart: always
    depends_on: [mariadb-v2]
    environment:
      WORDPRESS_DB_HOST: mariadb-v2
      WORDPRESS_DB_NAME: wp_gen_db
      WORDPRESS_DB_USER: ${WP_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
    volumes:
      - /home/maya/docker_volumes/wp-gen:/var/www/html
    networks:
      - internal-net
      - shared-proxy

  wordpress-saving:
    image: wordpress:6-fpm-alpine
    container_name: wordpress-saving-v2
    restart: always
    depends_on: [mariadb-v2]
    environment:
      WORDPRESS_DB_HOST: mariadb-v2
      WORDPRESS_DB_NAME: wp_saving_db
      WORDPRESS_DB_USER: ${WP_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
    volumes:
      - /home/maya/docker_volumes/wp-saving:/var/www/html
    networks:
      - internal-net
      - shared-proxy

  wordpress-adult:
    image: wordpress:6-fpm-alpine
    container_name: wordpress-adult-v2
    restart: always
    depends_on: [mariadb-v2]
    environment:
      WORDPRESS_DB_HOST: mariadb-v2
      WORDPRESS_DB_NAME: wp_adult_db
      WORDPRESS_DB_USER: ${WP_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
    volumes:
      - /home/maya/docker_volumes/wp-adult:/var/www/html
    networks:
      - internal-net
      - shared-proxy

  nginx-v2:
    image: nginx:alpine
    container_name: nginx-v2
    restart: always
    volumes:
      - static_volume_prod:/usr/share/nginx/html/static:ro
      - sitemap_data:/usr/share/nginx/html/sitemap_gen:ro
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/maya/docker_volumes/wp-gen:/var/www/html/gen:ro
      - /home/maya/docker_volumes/wp-saving:/var/www/html/saving:ro
      - /home/maya/docker_volumes/wp-adult:/var/www/html/adult:ro
      - ./nginx/conf/wp-multi-prod.conf:/etc/nginx/conf.d/wp-multi.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shin-vps_shared-proxy"
      - "traefik.http.routers.static-router.rule=Host(`tiper.live`, `bic-saving.com`, `bicstation.com`, `avflash.xyz`) && (PathPrefix(`/static`) || PathPrefix(`/sitemap_gen`))"
      - "traefik.http.routers.static-router.entrypoints=websecure"
      - "traefik.http.routers.static-router.tls.certresolver=le"
      - "traefik.http.routers.static-router.priority=2500"
      - "traefik.http.routers.blog-gen.rule=Host(`blog.bicstation.com`)"
      - "traefik.http.routers.blog-gen.entrypoints=websecure"
      - "traefik.http.routers.blog-gen.tls.certresolver=le"
      - "traefik.http.routers.blog-saving.rule=Host(`blog.bic-saving.com`)"
      - "traefik.http.routers.blog-saving.entrypoints=websecure"
      - "traefik.http.routers.blog-saving.tls.certresolver=le"
      - "traefik.http.routers.blog-adult.rule=Host(`blog.tiper.live`)"
      - "traefik.http.routers.blog-adult.entrypoints=websecure"
      - "traefik.http.routers.blog-adult.tls.certresolver=le"
      - "traefik.http.services.nginx-svc.loadbalancer.server.port=80"
    networks:
      - internal-net
      - shared-proxy

  # ---------------------------------------------------------------------
  # 5. 管理ツール層
  # ---------------------------------------------------------------------
  phpmyadmin-v2:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin-v2
    environment:
      PMA_HOST: mariadb-v2
      PMA_ABSOLUTE_URI: https://phpmyadmin.tiper.live/
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shin-vps_shared-proxy"
      - "traefik.http.routers.pma-router.rule=Host(`phpmyadmin.tiper.live`)"
      - "traefik.http.routers.pma-router.entrypoints=websecure"
      - "traefik.http.routers.pma-router.tls.certresolver=le"
      - "traefik.http.routers.pma-router.priority=3100"
      - "traefik.http.middlewares.pma-strip.stripprefix.prefixes=/phpmyadmin"
      - "traefik.http.routers.pma-router.middlewares=pma-strip"
      - "traefik.http.services.pma-svc.loadbalancer.server.port=80"
    networks:
      - internal-net
      - shared-proxy
  
  pgadmin-v2:
    image: dpage/pgadmin4
    container_name: pgadmin-v2
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT: 80
      SCRIPT_NAME: /
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shin-vps_shared-proxy"
      - "traefik.http.routers.pgadmin-router.rule=Host(`pgadmin.tiper.live`)"
      - "traefik.http.routers.pgadmin-router.entrypoints=websecure"
      - "traefik.http.routers.pgadmin-router.tls.certresolver=le"
      - "traefik.http.routers.pgadmin-router.priority=3100"
      - "traefik.http.services.pgadmin-svc.loadbalancer.server.port=80"
    networks:
      - internal-net
      - shared-proxy

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: always
    environment: 
      - DOZZLE_BASE=/
    volumes: 
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shin-vps_shared-proxy"
      - "traefik.http.routers.dozzle-router.rule=Host(`logs.tiper.live`)"
      - "traefik.http.routers.dozzle-router.entrypoints=websecure"
      - "traefik.http.routers.dozzle-router.tls.certresolver=le"
      - "traefik.http.routers.dozzle-router.priority=3500"
      - "traefik.http.services.dozzle-svc.loadbalancer.server.port=8080"
    networks:
      - shared-proxy

# ---------------------------------------------------------------------
# 共通設定
# ---------------------------------------------------------------------
networks:
  internal-net:
    driver: bridge
  shared-proxy:
    name: shin-vps_shared-proxy
    external: true

volumes:
  static_volume_prod:
  sitemap_data: