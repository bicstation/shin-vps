# ==============================================================================
# 🚀 SHIN CORE LINX｜STG OVERRIDE COMPOSE
# Production Mirror Runtime Universe
# ==============================================================================
#
# Philosophy:
#
# - base compose = runtime topology
# - stg compose = production mirror specialization
#
# Runtime Universe:
#
# - stg
#
# ==============================================================================

services:

  # ============================================================================
  # Traefik STG Proxy
  # ============================================================================
  traefik:

    image: traefik:v2.11

    restart: unless-stopped

    command:

      # ------------------------------------------------------------------------
      # Dashboard
      # ------------------------------------------------------------------------
      - "--api.dashboard=true"

      # ------------------------------------------------------------------------
      # Docker Provider
      # ------------------------------------------------------------------------
      - "--providers.docker=true"

      - "--providers.docker.exposedbydefault=false"

      - "--providers.docker.network=shared-proxy"

      # ------------------------------------------------------------------------
      # HTTP ONLY
      # ------------------------------------------------------------------------
      - "--entrypoints.web.address=:80"

    ports:

      - "8084:80"
      - "8086:8080"

    volumes:

      - "/var/run/docker.sock:/var/run/docker.sock:ro"

    networks:

      - shared-proxy


  # ============================================================================
  # Django STG Runtime
  # ============================================================================
  django-v3:

    env_file:

      - .env.stg

    restart: always

    environment:

      DJANGO_ENV: stg

      RUNTIME_UNIVERSE: stg

    labels:

      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      # ------------------------------------------------------------------------
      # API ROUTING
      # ------------------------------------------------------------------------
      - 'traefik.http.routers.api.rule=Host("stg-api.bicstation.com","stg-api.bic-saving.com","stg-api.tiper.live","stg-api.avflash.xyz")'

      - "traefik.http.routers.api.entrypoints=web"

      - "traefik.http.routers.api.priority=3000"

      - "traefik.http.services.api.loadbalancer.server.port=8000"


  # ============================================================================
  # Media Runtime
  # ============================================================================
  nginx-media:

    image: nginx:alpine

    restart: always

    volumes:

      - ./django/media:/usr/src/app/media

      - ./nginx/media.conf:/etc/nginx/conf.d/default.conf

    networks:

      - shared-proxy

    labels:

      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      # ------------------------------------------------------------------------
      # MEDIA ROUTING
      # ------------------------------------------------------------------------
      - 'traefik.http.routers.media.rule=Host("stg-media.bicstation.com","stg-media.bic-saving.com","stg-media.tiper.live","stg-media.avflash.xyz")'

      - "traefik.http.routers.media.entrypoints=web"

      - "traefik.http.routers.media.priority=2500"

      - "traefik.http.services.media.loadbalancer.server.port=80"


  # ============================================================================
  # Bicstation Frontend
  # ============================================================================
  next-bicstation-v3:

    env_file:

      - .env.stg

    restart: always

    environment:

      NEXT_PUBLIC_RUNTIME_UNIVERSE: stg

      NEXT_PUBLIC_RUNTIME_MODE: stg

    labels:

      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      - 'traefik.http.routers.stg-bicstation.rule=Host("stg.bicstation.com")'

      - "traefik.http.routers.stg-bicstation.entrypoints=web"

      - "traefik.http.routers.stg-bicstation.priority=100"

      - "traefik.http.services.stg-bicstation.loadbalancer.server.port=3000"


  # ============================================================================
  # Bic Saving Frontend
  # ============================================================================
  next-bic-saving-v3:

    env_file:

      - .env.stg

    restart: always

    environment:

      NEXT_PUBLIC_RUNTIME_UNIVERSE: stg

      NEXT_PUBLIC_RUNTIME_MODE: stg

    labels:

      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      - 'traefik.http.routers.stg-saving.rule=Host("stg.bic-saving.com")'

      - "traefik.http.routers.stg-saving.entrypoints=web"

      - "traefik.http.routers.stg-saving.priority=100"

      - "traefik.http.services.stg-saving.loadbalancer.server.port=3000"


  # ============================================================================
  # Tiper Frontend
  # ============================================================================
  next-tiper-v3:

    env_file:

      - .env.stg

    restart: always

    environment:

      NEXT_PUBLIC_RUNTIME_UNIVERSE: stg

      NEXT_PUBLIC_RUNTIME_MODE: stg

    labels:

      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      - 'traefik.http.routers.stg-tiper.rule=Host("stg.tiper.live")'

      - "traefik.http.routers.stg-tiper.entrypoints=web"

      - "traefik.http.routers.stg-tiper.priority=100"

      - "traefik.http.services.stg-tiper.loadbalancer.server.port=3000"


  # ============================================================================
  # AVFlash Frontend
  # ============================================================================
  next-avflash-v3:

    env_file:

      - .env.stg

    restart: always

    environment:

      NEXT_PUBLIC_RUNTIME_UNIVERSE: stg

      NEXT_PUBLIC_RUNTIME_MODE: stg

    labels:

      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      - 'traefik.http.routers.stg-avflash.rule=Host("stg.avflash.xyz")'

      - "traefik.http.routers.stg-avflash.entrypoints=web"

      - "traefik.http.routers.stg-avflash.priority=100"

      - "traefik.http.services.stg-avflash.loadbalancer.server.port=3000"


# ==============================================================================
# Networks
# ==============================================================================
networks:

  shared-proxy:

    external: true