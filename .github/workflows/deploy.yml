name: Production Deployment

on:
  push:
    # v1.0.0 などのタグ push 時のみ deploy
    tags:
      - 'v*'

jobs:

  deploy:

    runs-on: ubuntu-latest

    timeout-minutes: 60

    env:
      PROJECT_NAME: shin-vps
      DEPLOY_PATH: /home/maya/shin-vps
      COMPOSE_FILE: docker-compose.prod.yml
      ENV_FILE: .env.production

    steps:

      # ==========================================================================
      # 📦 Checkout
      # ==========================================================================

      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ==========================================================================
      # 🧹 Cleanup
      # ==========================================================================

      - name: 🧹 Cleanup Unnecessary Files
        run: |
          rm -rf \
            .git \
            .github \
            .venv \
            __pycache__ \
            node_modules \
            .next \
            */node_modules \
            */.next

          echo "✅ Cleanup Complete"

      # ==========================================================================
      # 🚀 Sync Files
      # ==========================================================================

      - name: 🚀 Sync Files to VPS
        uses: appleboy/scp-action@v0.1.7

        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}

          port: 2222

          source: "."
          target: "/home/maya/shin-vps"

          strip_components: 0
          overwrite: true

      # ==========================================================================
      # 🚀 Deploy
      # ==========================================================================

      - name: 🚀 Deploy to Production
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}

          port: 2222

          command_timeout: 60m

          script: |

            set -e

            cd /home/maya/shin-vps

            echo ""
            echo "======================================================"
            echo "🚀 SHIN CORE LINX｜PRODUCTION DEPLOY"
            echo "======================================================"

            # ==============================================================
            # 🌐 Shared Network
            # ==============================================================

            echo ""
            echo "🌐 Checking shared docker network..."

            docker network inspect shin-vps_shared-proxy >/dev/null 2>&1 || \
            docker network create shin-vps_shared-proxy

            echo "✅ Network Ready"

            # ==============================================================
            # 📦 Docker Build
            # ==============================================================

            echo ""
            echo "📦 Building Containers..."

            docker compose \
              -p shin-vps \
              --env-file .env.production \
              -f docker-compose.prod.yml \
              build \
              --parallel

            echo "✅ Parallel Build Complete"

            # ==============================================================
            # 🚀 Container Startup
            # ==============================================================

            echo ""
            echo "🚀 Starting Containers..."

            docker compose \
              -p shin-vps \
              --env-file .env.production \
              -f docker-compose.prod.yml \
              up -d \
              --remove-orphans \
              --wait

            echo "✅ Containers Started"

            # ==============================================================
            # 📦 Django Migration
            # ==============================================================

            echo ""
            echo "📦 Running Migrations..."

            docker compose \
              -p shin-vps \
              --env-file .env.production \
              -f docker-compose.prod.yml \
              exec -T django-v3 \
              python manage.py migrate --noinput

            echo "✅ Migration Complete"

            # ==============================================================
            # 🎨 Collect Static
            # ==============================================================

            echo ""
            echo "🎨 Collecting Static Files..."

            docker compose \
              -p shin-vps \
              --env-file .env.production \
              -f docker-compose.prod.yml \
              exec -T django-v3 \
              python manage.py collectstatic --noinput

            echo "✅ Static Collection Complete"

            # ==============================================================
            # 🩺 Health Check
            # ==============================================================

            echo ""
            echo "🩺 Running Health Checks..."

            curl -f http://localhost:8083/api/status/ || exit 1

            echo "✅ API Health Check Passed"

            # ==============================================================
            # 📊 Container Status
            # ==============================================================

            echo ""
            echo "📊 Container Status"

            docker compose \
              -p shin-vps \
              --env-file .env.production \
              -f docker-compose.prod.yml \
              ps

            # ==============================================================
            # 📄 Nginx Logs
            # ==============================================================

            echo ""
            echo "📄 nginx-media Logs"

            docker logs --tail 50 nginx-media || true

            # ==============================================================
            # 🧹 Cleanup
            # ==============================================================

            echo ""
            echo "🧹 Docker Cleanup"

            docker image prune -af || true

            docker builder prune -af || true

            echo "✅ Cleanup Complete"

            # ==============================================================
            # 🎉 Done
            # ==============================================================

            echo ""
            echo "======================================================"
            echo "✅ PRODUCTION DEPLOY SUCCESS"
            echo "======================================================"
            echo ""