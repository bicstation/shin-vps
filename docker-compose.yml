# =====================================================================
# 🛡️ SHIN-VPS v3.9 [Next.js ホットリロード対応・Django同期修正版]
# ---------------------------------------------------------------------
# 🚀 最終同期アップデート:
# 1. 各 Next.js コンテナの volumes を追加し、ローカル編集を即反映
# 2. Django の volumes に ./django をマウントし、プロンプト編集を即反映
# 3. ネットワーク干渉を避けるため IPv6 を明示的に無効化
# =====================================================================

services:
  # --- 0. Traefik (管制塔: リバースプロキシ) ---
  traefik:
    image: traefik:v2.11
    container_name: traefik-proxy-v3
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--accesslog=true"
    ports:
      - "8083:80"      # ローカルメイン窓口
      - "8085:8080"    # Traefik ダッシュボード
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - shared-proxy

  # --- 1. データベース層 (PostgreSQL) ---
  postgres-db-v3:
    image: postgres:15-alpine
    container_name: postgres-db-v3
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 2. バックエンド層 (Django) ---
  django-v3:
    build:
      context: .
      dockerfile: ./django/Dockerfile
    container_name: django-v3
    restart: always
    command: >
      gunicorn tiper_api.wsgi:application
      --bind 0.0.0.0:8000
      --workers 5
      --threads 2
      --worker-class gthread
      --timeout 120
      --max-requests 1000
    depends_on:
      postgres-db-v3:
        condition: service_healthy
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django-api.rule=Host(`api.tiper.live`, `api.bicstation.com`, `api.avflash.xyz`, `api.bic-saving.com`, `api-tiper-host`, `api-bicstation-host`, `api-avflash-host`, `api-saving-host`, `django-v3`) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/static`))"
      - "traefik.http.routers.django-api.priority=3000"
      - "traefik.http.services.django-svc.loadbalancer.server.port=8000"
    volumes:
      - ./django:/usr/src/app                                 # 👈 プロンプトやコードの即時同期
      - ${DATA_ROOT}/django_static:/usr/src/app/staticfiles
    networks:
      - internal-net
      - shared-proxy

  # --- 3. フロントエンド層 (Next.js) ---

  next-bicstation-v3:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-bicstation
    container_name: next-bicstation-v3
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=next-bicstation
      - NEXT_PUBLIC_SITE_DOMAIN=bicstation-host
      - INTERNAL_API_URL=http://django-v3:8000
    volumes:
      - ./next-bicstation:/usr/src/app                        # 👈 同期有効化
      - ./shared:/usr/src/app/shared
      - /usr/src/app/node_modules                             # コンテナ内ライブラリを優先
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bic-router.rule=Host(`bicstation-host`)"
      - "traefik.http.routers.bic-router.priority=5000"
      - "traefik.http.services.bic-svc.loadbalancer.server.port=3000"

  next-tiper-v3:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-tiper
    container_name: next-tiper-v3
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=next-tiper
      - NEXT_PUBLIC_SITE_DOMAIN=tiper-host
      - INTERNAL_API_URL=http://django-v3:8000
    volumes:
      - ./next-tiper:/usr/src/app                             # 👈 同期有効化
      - ./shared:/usr/src/app/shared
      - /usr/src/app/node_modules
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tiper-router.rule=Host(`tiper-host`)"
      - "traefik.http.routers.tiper-router.priority=4000"
      - "traefik.http.services.tiper-svc.loadbalancer.server.port=3000"

  next-bic-saving-v3:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-bic-saving
    container_name: next-bic-saving-v3
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=next-bic-saving
      - NEXT_PUBLIC_SITE_DOMAIN=saving-host
      - INTERNAL_API_URL=http://django-v3:8000
    volumes:
      - ./next-bic-saving:/usr/src/app                        # 👈 同期有効化
      - ./shared:/usr/src/app/shared
      - /usr/src/app/node_modules
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.saving-router.rule=Host(`saving-host`)"
      - "traefik.http.routers.saving-router.priority=4000"
      - "traefik.http.services.saving-svc.loadbalancer.server.port=3000"

  next-avflash-v3:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-avflash
    container_name: next-avflash-v3
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=next-avflash
      - NEXT_PUBLIC_SITE_DOMAIN=avflash-host
      - INTERNAL_API_URL=http://django-v3:8000
    volumes:
      - ./next-avflash:/usr/src/app                           # 👈 同期有効化
      - ./shared:/usr/src/app/shared
      - /usr/src/app/node_modules
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.avflash-router.rule=Host(`avflash-host`)"
      - "traefik.http.routers.avflash-router.priority=4000"
      - "traefik.http.services.avflash-svc.loadbalancer.server.port=3000"

  # --- 4. 管理・監視ツール ---
  pgadmin-v3:
    image: dpage/pgadmin4
    container_name: pgadmin-v3
    restart: always
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-bicstation@gmail.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-1402nabe}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin-router.rule=Host(`pgadmin-host`)"

  dozzle-v3:
    image: amir20/dozzle:latest
    container_name: dozzle-v3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - shared-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle-router.rule=Host(`log-host`)"

networks:
  internal-net:
    name: "shin-vps_internal-net"
    driver: bridge
    enable_ipv6: false
    ipam:
      config:
        - subnet: 172.28.0.0/16

  shared-proxy:
    external: true
    name: "shared-proxy"