      - "traefik.http.routers.tiper.entrypoints=web"

      - "traefik.http.services.tiper.loadbalancer.server.port=3000"

  # =========================================================
  # avflash
  # =========================================================
  next-avflash-v3:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile

      args:
        PROJECT_NAME: next-avflash

        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://avflash-host:8083/api}

        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://django-v3:8000/api}

    container_name: next-avflash-v3
    restart: always

    env_file:
      - .env.local

    environment:
      NEXT_PUBLIC_SITE_DOMAIN: avflash-host

      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://avflash-host:8083/api}

      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://django-v3:8000/api}

    networks:
      - internal-net
      - shared-proxy

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"

      - "traefik.http.routers.avflash.rule=Host(`avflash-host`)"
      - "traefik.http.routers.avflash.entrypoints=web"

      - "traefik.http.services.avflash.loadbalancer.server.port=3000"

# -------------------------------------------------------------------
# volumes
# -------------------------------------------------------------------
volumes:
  postgres_data:

# -------------------------------------------------------------------
# networks
# -------------------------------------------------------------------
networks:
  internal-net:
    driver: bridge

  shared-proxy:
    external: true