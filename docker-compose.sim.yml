# -------------------------------------------------------------------
# volumes
# -------------------------------------------------------------------
volumes:
  postgres_data_sim:

# -------------------------------------------------------------------
# networks
# -------------------------------------------------------------------
networks:
  internal-net:
    driver: bridge

  shared-proxy:
    external: true