name: SHIN CORE LINX｜Production Deploy

on:
  push:
    tags:
      - 'v*'

jobs:

  deploy:

    runs-on: ubuntu-latest

    timeout-minutes: 90

    env:
      PROJECT_NAME: shin-vps
      DEPLOY_PATH: /home/maya/shin-vps

      COMPOSE_FILE: docker-compose.prod.yml
      ENV_FILE: .env.production

    steps:

      # ==========================================================
      # 📥 Checkout
      # ==========================================================
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ==========================================================
      # 🧹 Cleanup Local Artifacts
      # ==========================================================
      - name: 🧹 Cleanup Unnecessary Files

        run: |

          rm -rf \
            .git \
            .github \
            .venv \
            __pycache__ \
            node_modules \
            .next \
            */node_modules \
            */.next \
            */dist \
            */build

          echo "✅ Cleanup Complete"

      # ==========================================================
      # 🚀 Upload Source
      # ==========================================================
      - name: 🚀 Upload Files to VPS

        uses: appleboy/scp-action@v0.1.7

        with:
          host: ${{ secrets.SSH_HOST }}

          username: ${{ secrets.SSH_USER }}

          key: ${{ secrets.SSH_PRIVATE_KEY }}

          passphrase: ${{ secrets.SSH_PASSPHRASE }}

          port: 2222

          source: "."

          target: "/home/maya/shin-vps"

          strip_components: 0

          overwrite: true

      # ==========================================================
      # 🚀 Production Deploy
      # ==========================================================
      - name: 🚀 Deploy to Production

        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.SSH_HOST }}

          username: ${{ secrets.SSH_USER }}

          key: ${{ secrets.SSH_PRIVATE_KEY }}

          passphrase: ${{ secrets.SSH_PASSPHRASE }}

          port: 2222

          command_timeout: 90m

          script: |

            set -e

            cd /home/maya/shin-vps

            echo ""
            echo "=================================================="
            echo "🚀 SHIN CORE LINX｜PRODUCTION DEPLOY"
            echo "=================================================="

            # ==================================================
            # 🌐 Shared Docker Network
            # ==================================================

            echo ""
            echo "🌐 Preparing Shared Network..."

            docker network inspect shared-proxy >/dev/null 2>&1 || \
            docker network create shared-proxy

            echo "✅ Shared Network Ready"

            # ==================================================
            # 🧹 Runtime Cache Cleanup
            # ==================================================

            echo ""
            echo "🧹 Cleaning Runtime Cache..."

            find . -type d -name ".next" \
              ! -path "./postgres_data/*" \
              ! -path "./vps-data/*" \
              -exec rm -rf {} + \
              2>/dev/null || true

            echo "✅ Runtime Cache Cleaned"

            # ==================================================
            # 📦 Docker Build
            # ==================================================

            echo ""
            echo "📦 Building Containers..."

            docker compose \
              -p shin-vps \
              --env-file .env.production \
              -f docker-compose.prod.yml \
              build \
              --parallel \
              --no-cache

            echo "✅ Container Build Complete"

            # ==================================================
            # 🚀 Startup
            # ==================================================

            echo ""
            echo "🚀 Starting Containers..."

            docker compose \
              -p shin-vps \
              --env-file .env.production \
              -f docker-compose.prod.yml \
              up -d \
              --remove-orphans \
              --wait

            echo "✅ Containers Started"

            # ==================================================
            # 📦 Django Migration
            # ==================================================

            echo ""
            echo "📦 Running Migrations..."

            docker compose \
              -p shin-vps \
              --env-file .env.production \
              -f docker-compose.prod.yml \
              exec -T django-v3 \
              python manage.py migrate --noinput

            echo "✅ Migration Complete"

            # ==================================================
            # 🎨 Static Files
            # ==================================================

            echo ""
            echo "🎨 Collecting Static..."

            docker compose \
              -p shin-vps \
              --env-file .env.production \
              -f docker-compose.prod.yml \
              exec -T django-v3 \
              python manage.py collectstatic --noinput

            echo "✅ Static Complete"

            # ==================================================
            # 🩺 Health Check
            # ==================================================

            echo ""
            echo "🩺 Running Health Checks..."

            curl -f http://localhost:8083/api/status/ || exit 1

            echo "✅ Django API OK"

            curl -f http://localhost:8083/ || exit 1

            echo "✅ Frontend OK"

            # ==================================================
            # 📊 Status
            # ==================================================

            echo ""
            echo "📊 Container Status"

            docker compose \
              -p shin-vps \
              --env-file .env.production \
              -f docker-compose.prod.yml \
              ps

            # ==================================================
            # 📄 Logs
            # ==================================================

            echo ""
            echo "📄 Last Runtime Logs"

            docker logs --tail 30 django-v3 || true

            docker logs --tail 30 next-bicstation-v3 || true

            # ==================================================
            # 🧹 Docker Cleanup
            # ==================================================

            echo ""
            echo "🧹 Docker Cleanup"

            docker image prune -af || true

            docker builder prune -af || true

            docker container prune -f || true

            echo "✅ Cleanup Complete"

            # ==================================================
            # 🎉 Done
            # ==================================================

            echo ""
            echo "=================================================="
            echo "✅ SHIN CORE LINX DEPLOY SUCCESS"
            echo "=================================================="
            echo ""