# ==============================================================================
# 🚀 SHIN CORE LINX｜PRODUCTION OVERRIDE COMPOSE
# VPS Production Runtime Authority
# ==============================================================================
#
# Philosophy:
#
# - base compose = runtime topology
# - prod compose = production specialization
#
# Runtime Universe:
#
# - prod
#
# IMPORTANT:
#
# - Existing DB authority preserved
# - Existing routing contracts preserved
# - Existing domains preserved
#
# ==============================================================================

services:

  # ============================================================================
  # Traefik Reverse Proxy
  # ============================================================================
  traefik:

    image: traefik:v2.11

    restart: always

    command:

      # ------------------------------------------------------------------------
      # Dashboard
      # ------------------------------------------------------------------------
      - "--api.dashboard=true"

      # ------------------------------------------------------------------------
      # Docker Provider
      # ------------------------------------------------------------------------
      - "--providers.docker=true"

      - "--providers.docker.exposedbydefault=false"

      - "--providers.docker.network=shared-proxy"

      # ------------------------------------------------------------------------
      # HTTPS ENTRYPOINTS
      # ------------------------------------------------------------------------
      - "--entrypoints.web.address=:80"

      - "--entrypoints.websecure.address=:443"

      # ------------------------------------------------------------------------
      # ACME / LETSENCRYPT
      # ------------------------------------------------------------------------
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}"

      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"

      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"

      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"

    ports:

      - "80:80"

      - "443:443"

    volumes:

      - "/var/run/docker.sock:/var/run/docker.sock:ro"

      - "./letsencrypt:/letsencrypt"

    networks:

      - shared-proxy


  # ============================================================================
  # Django Production Runtime
  # ============================================================================
  django-v3:

    env_file:

      - .env.production

    restart: always

    environment:

      DJANGO_ENV: production

      RUNTIME_UNIVERSE: prod

    labels:

      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      # ------------------------------------------------------------------------
      # API ROUTING
      # ------------------------------------------------------------------------
      - 'traefik.http.routers.api.rule=Host("api.bicstation.com","api.bic-saving.com","api.tiper.live","api.avflash.xyz")'

      - "traefik.http.routers.api.entrypoints=websecure"

      - "traefik.http.routers.api.tls=true"

      - "traefik.http.routers.api.tls.certresolver=letsencrypt"

      - "traefik.http.routers.api.priority=3000"

      - "traefik.http.services.api.loadbalancer.server.port=8000"


  # ============================================================================
  # Media CDN Runtime
  # ============================================================================
  nginx-media:

    image: nginx:alpine

    restart: always

    volumes:

      - ./django/media:/usr/src/app/media

      - ./nginx/media.conf:/etc/nginx/conf.d/default.conf

    networks:

      - shared-proxy

    labels:

      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      # ------------------------------------------------------------------------
      # MEDIA ROUTING
      # ------------------------------------------------------------------------
      - 'traefik.http.routers.media.rule=Host("media.bicstation.com","media.bic-saving.com","media.tiper.live","media.avflash.xyz")'

      - "traefik.http.routers.media.entrypoints=websecure"

      - "traefik.http.routers.media.tls=true"

      - "traefik.http.routers.media.tls.certresolver=letsencrypt"

      - "traefik.http.routers.media.priority=2500"

      - "traefik.http.services.media.loadbalancer.server.port=80"


  # ============================================================================
  # Bicstation Frontend
  # ============================================================================
  next-bicstation-v3:

    env_file:

      - .env.production

    restart: always

    environment:

      NEXT_PUBLIC_RUNTIME_UNIVERSE: prod

      NEXT_PUBLIC_RUNTIME_MODE: prod

    labels:

      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      - 'traefik.http.routers.bicstation.rule=Host("bicstation.com","www.bicstation.com")'

      - "traefik.http.routers.bicstation.entrypoints=websecure"

      - "traefik.http.routers.bicstation.tls=true"

      - "traefik.http.routers.bicstation.tls.certresolver=letsencrypt"

      - "traefik.http.routers.bicstation.priority=100"

      - "traefik.http.services.bicstation.loadbalancer.server.port=3000"


  # ============================================================================
  # Bic Saving Frontend
  # ============================================================================
  next-bic-saving-v3:

    env_file:

      - .env.production

    restart: always

    environment:

      NEXT_PUBLIC_RUNTIME_UNIVERSE: prod

      NEXT_PUBLIC_RUNTIME_MODE: prod

    labels:

      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      - 'traefik.http.routers.saving.rule=Host("bic-saving.com","www.bic-saving.com")'

      - "traefik.http.routers.saving.entrypoints=websecure"

      - "traefik.http.routers.saving.tls=true"

      - "traefik.http.routers.saving.tls.certresolver=letsencrypt"

      - "traefik.http.routers.saving.priority=100"

      - "traefik.http.services.saving.loadbalancer.server.port=3000"


  # ============================================================================
  # Tiper Frontend
  # ============================================================================
  next-tiper-v3:

    env_file:

      - .env.production

    restart: always

    environment:

      NEXT_PUBLIC_RUNTIME_UNIVERSE: prod

      NEXT_PUBLIC_RUNTIME_MODE: prod

    labels:

      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      - 'traefik.http.routers.tiper.rule=Host("tiper.live","www.tiper.live")'

      - "traefik.http.routers.tiper.entrypoints=websecure"

      - "traefik.http.routers.tiper.tls=true"

      - "traefik.http.routers.tiper.tls.certresolver=letsencrypt"

      - "traefik.http.routers.tiper.priority=100"

      - "traefik.http.services.tiper.loadbalancer.server.port=3000"


  # ============================================================================
  # AVFlash Frontend
  # ============================================================================
  next-avflash-v3:

    env_file:

      - .env.production

    restart: always

    environment:

      NEXT_PUBLIC_RUNTIME_UNIVERSE: prod

      NEXT_PUBLIC_RUNTIME_MODE: prod

    labels:

      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      - 'traefik.http.routers.avflash.rule=Host("avflash.xyz","www.avflash.xyz")'

      - "traefik.http.routers.avflash.entrypoints=websecure"

      - "traefik.http.routers.avflash.tls=true"

      - "traefik.http.routers.avflash.tls.certresolver=letsencrypt"

      - "traefik.http.routers.avflash.priority=100"

      - "traefik.http.services.avflash.loadbalancer.server.port=3000"


# ==============================================================================
# Networks
# ==============================================================================
networks:

  shared-proxy:

    external: true