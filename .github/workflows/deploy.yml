name: Production Deployment

on:
  push:
    # v1.0.0 などのタグがプッシュされた時だけ動作
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 💡 修正: 転送前に不要なファイルを削除 (scp-action に exclude がないため)
      - name: Cleanup unnecessary files before sync
        run: |
          rm -rf .git .github .venv __pycache__ node_modules
          echo "🧹 不要なファイルを削除しました。"

      # 1. ファイルを VPS のディレクトリへ同期
      - name: Sync Files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 2222
          source: "." 
          target: "/home/maya/shin-vps"
          strip_components: 0
          overwrite: true
          # 💡 exclude 引数は削除しました (エラー回避)

      # 2. SSH経由でネットワーク構築・Docker起動・DBマイグレーション・掃除を実行
      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 2222
          command_timeout: 30m # 💡 修正: ビルド中のタイムアウト（Playwright対策）を防ぐために延長
          script: |
            set -e
            cd /home/maya/shin-vps
            
            echo "🔧 ネットワーク環境を整備します..."
            docker network inspect shin-vps_shared-proxy >/dev/null 2>&1 || docker network create shin-vps_shared-proxy

            echo "🚀 本番環境(prod)をビルド・起動します..."
            # 💡 Playwright 等の重いビルドが含まれるため、ビルド成功をしっかり待ちます
            docker compose -p shin-vps -f docker-compose.prod.yml up -d --build --remove-orphans --wait
            
            echo "📦 データベースを更新します..."
            docker compose -p shin-vps -f docker-compose.prod.yml exec -T django-v3 python manage.py migrate --noinput

            echo "🎨 静的ファイルを収集します..."
            docker compose -p shin-vps -f docker-compose.prod.yml exec -T django-v3 python manage.py collectstatic --noinput

            echo "🧹 徹底的なクリーンアップを開始します..."
            docker image prune -af
            docker builder prune -f
            docker volume prune -f
            docker system prune -f

            echo "✅ デプロイ成功！全ての処理と掃除が完了しました。"