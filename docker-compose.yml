# =====================================================================
# 🛡️ SHIN-VPS v3.2 自宅PC完全制覇版 (Volume & Path Optimized)
# =====================================================================

services:
  # --- 0. Traefik (管制塔) ---
  traefik:
    image: traefik:v2.11
    container_name: traefik-proxy-v3
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--accesslog=true"
    ports:
      - "8083:80"      # メイン窓口
      - "8085:8080"    # Traefik ダッシュボード
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - shared-proxy

  # --- 1. データベース層 ---
  postgres-db-v3:
    image: postgres:15-alpine
    container_name: postgres-db-v3
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 2. バックエンド層 (Django) ---
  django-v3:
    build:
      context: .
      dockerfile: ./django/Dockerfile
    container_name: django-v3
    restart: always
    depends_on:
      postgres-db-v3:
        condition: service_healthy
    env_file: .env
    environment:
      - INTERNAL_API_URL=http://django-v3:8000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django-api.rule=(HostRegexp(`{sub:[a-z-]+}-host`) || HostRegexp(`{sub:[a-z-]+}.live`) || HostRegexp(`{sub:[a-z-]+}.com`)) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/static`) || PathPrefix(`/blog`))"
      - "traefik.http.routers.django-api.priority=3000"
      - "traefik.http.services.django-svc.loadbalancer.server.port=8000"
    volumes:
      - ./django:/usr/src/app
      - ${DATA_ROOT}/django_static:/usr/src/app/staticfiles
      - ./next-bicstation/content:/usr/src/app/next-bicstation/content
      - ./next-tiper/content:/usr/src/app/next-tiper/content
      - ./next-bic-saving/content:/usr/src/app/next-bic-saving/content
      - ./next-avflash/content:/usr/src/app/next-avflash/content
    networks:
      - internal-net
      - shared-proxy

  # --- 3. フロントエンド層 (Next.js) ---
  
  next-bicstation-v3:
    build: 
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-bicstation
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: next-bicstation-v3
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=next-bicstation
      - NEXT_PUBLIC_SITE_DOMAIN=bicstation-host
      - INTERNAL_API_URL=http://django-v3:8000
    volumes:
      - ./shared:/usr/src/app/shared
      - ./next-bicstation/content:/usr/src/app/content
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bic-router.rule=Host(`bicstation-host`)"
      - "traefik.http.routers.bic-router.priority=5000"
      - "traefik.http.services.bic-svc.loadbalancer.server.port=3000"

  next-tiper-v3:
    build: 
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-tiper
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: next-tiper-v3
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=next-tiper
      - NEXT_PUBLIC_SITE_DOMAIN=tiper-host
      - INTERNAL_API_URL=http://django-v3:8000
    volumes:
      - ./shared:/usr/src/app/shared
      - ./next-tiper/content:/usr/src/app/content
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tiper-router.rule=Host(`tiper-host`)"
      - "traefik.http.routers.tiper-router.priority=4000"
      - "traefik.http.services.tiper-svc.loadbalancer.server.port=3000"

  next-bic-saving-v3:
    build: 
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-bic-saving
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: next-bic-saving-v3
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=next-bic-saving
      - NEXT_PUBLIC_SITE_DOMAIN=saving-host
      - INTERNAL_API_URL=http://django-v3:8000
    volumes:
      - ./shared:/usr/src/app/shared
      - ./next-bic-saving/content:/usr/src/app/content
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.saving-router.rule=Host(`saving-host`)"
      - "traefik.http.routers.saving-router.priority=4000"
      - "traefik.http.services.saving-svc.loadbalancer.server.port=3000"

  next-avflash-v3:
    build: 
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-avflash
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: next-avflash-v3
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=next-avflash
      - NEXT_PUBLIC_SITE_DOMAIN=avflash-host
      - INTERNAL_API_URL=http://django-v3:8000
    volumes:
      - ./shared:/usr/src/app/shared
      - ./next-avflash/content:/usr/src/app/content
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.avflash-router.rule=Host(`avflash-host`)"
      - "traefik.http.routers.avflash-router.priority=4000"
      - "traefik.http.services.avflash-svc.loadbalancer.server.port=3000"

  # --- 4. 管理・監視ツール ---
  pgadmin-v3:
    image: dpage/pgadmin4
    container_name: pgadmin-v3
    env_file: .env
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin-router.rule=Host(`pgadmin-host`)"
      - "traefik.http.services.pgadmin-svc.loadbalancer.server.port=80"

  dozzle-v3:
    image: amir20/dozzle:latest
    container_name: dozzle-v3
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - shared-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle-router.rule=Host(`log-host`)"
      - "traefik.http.services.dozzle-svc.loadbalancer.server.port=8080"

networks:
  internal-net:
    name: "shin-vps_internal-net"
  shared-proxy:
    external: true
    name: "shared-proxy"