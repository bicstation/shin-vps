# =====================================================================
# 🛡️ SHIN-VPS v7 [Production Stable - Commented Final]
# =====================================================================
# ■ このファイルは「本番環境」
# ・ドメイン経由でアクセス（bicstation.com）
# ・/api → Django
# ・それ以外 → Next
# ・ローカルと同じ挙動を再現する
# ・DBは named volume（永続化）
# =====================================================================

services:

  # -------------------------
  # 0. Traefik（本番ルーター）
  # -------------------------
  # ■ HTTPS / ドメイン対応
  traefik:
    image: traefik:v2.11
    container_name: traefik-proxy
    restart: always

    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      # HTTP
      - "--entrypoints.web.address=:80"

      # HTTPS
      - "--entrypoints.websecure.address=:443"

      # Let's Encrypt
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"

    networks:
      - shared-proxy

  # -------------------------
  # 1. PostgreSQL（DB）
  # -------------------------
  # ■ 本番DB（絶対に消さない）
  postgres-db-v3:
    image: postgres:15-alpine
    container_name: postgres-db-v3
    restart: always

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

    networks:
      - internal-net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    shm_size: 256mb

  # -------------------------
  # 2. Django（API）
  # -------------------------
  django-v3:
    build:
      context: .
      dockerfile: ./django/Dockerfile
    container_name: django-v3
    restart: always

    depends_on:
      postgres-db-v3:
        condition: service_healthy

    env_file: .env.production

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn tiper_api.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      "

    volumes:
      - ./django/media:/usr/src/app/media

    networks:
      - internal-net
      - shared-proxy

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"

      # ■ 本番ルーティング（ドメイン＋API）
      - "traefik.http.routers.django.rule=Host(`bicstation.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.django.priority=100"

      # HTTPS有効
      - "traefik.http.routers.django.entrypoints=websecure"
      - "traefik.http.routers.django.tls.certresolver=myresolver"

      - "traefik.http.services.django.loadbalancer.server.port=8000"

  # -------------------------
  # 3. Media配信
  # -------------------------
  nginx-media:
    image: nginx:alpine
    container_name: nginx-media
    restart: always

    volumes:
      - ./django/media:/usr/src/app/media
      - ./nginx/media.conf:/etc/nginx/conf.d/default.conf

    networks:
      - shared-proxy

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.media.rule=Host(`bicstation.com`) && PathPrefix(`/media/`)"
      - "traefik.http.routers.media.entrypoints=websecure"
      - "traefik.http.routers.media.tls.certresolver=myresolver"
      - "traefik.http.services.media.loadbalancer.server.port=80"

  # -------------------------
  # 4. Front（Bicstation）
  # -------------------------
  next-bicstation-v3:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-bicstation

    container_name: next-bicstation-v3
    restart: always

    env_file: .env.production

    environment:
      - NEXT_PUBLIC_SITE_DOMAIN=bicstation
      - NEXT_PUBLIC_API_URL=https://bicstation.com/api
      - INTERNAL_API_URL=http://django-v3:8000

    networks:
      - internal-net
      - shared-proxy

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"

      # ■ API以外は全部フロント
      - "traefik.http.routers.front.rule=Host(`bicstation.com`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.front.priority=1"

      - "traefik.http.routers.front.entrypoints=websecure"
      - "traefik.http.routers.front.tls.certresolver=myresolver"

      - "traefik.http.services.front.loadbalancer.server.port=3000"

# -------------------------
# volumes（本番DB）
# -------------------------
volumes:
  postgres_data_prod:

# -------------------------
# networks
# -------------------------
networks:
  internal-net:
    driver: bridge

  shared-proxy:
    external: true