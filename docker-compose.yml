# -*- coding: utf-8 -*-
# =====================================================================
# 🛡️ SHIN-VPS v5.1 [Final Stability & Routing Edition]
# 🚀 修正ログ:
# 1. [FIX] Django API の優先度を全 Router 中最高の 6000 に設定。
# 2. [FIX] 各 Next.js コンテナに NEXT_PUBLIC_SITE_DOMAIN を追加し、Identity Resolved: undefined を根絶。
# 3. [FIX] ネットワーク shared-proxy を外部参照 (external) で固定。
# =====================================================================

services:
  # --- 0. Traefik (管制塔) ---
  traefik:
    image: traefik:v2.11
    container_name: traefik-proxy-v3
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--accesslog=true"
    ports:
      - "8083:80"      # API / Frontend 内部ゲートウェイ
      - "8085:8080"    # Traefik ダッシュボード
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - shared-proxy

  # --- 1. データベース層 ---
  postgres-db-v3:
    image: postgres:15-alpine
    container_name: postgres-db-v3
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 2. バックエンド層 (Django) ---
  django-v3:
    build:
      context: .
      dockerfile: ./django/Dockerfile
    container_name: django-v3
    restart: always
    command: gunicorn tiper_api.wsgi:application --bind 0.0.0.0:8000 --workers 5 --threads 2 --worker-class gthread --timeout 120 --max-requests 1000
    depends_on:
      postgres-db-v3:
        condition: service_healthy
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.django-api.rule=(Host(`api-saving-host`, `api-bicstation-host`, `api-tiper-host`, `api-avflash-host`) || HostRegexp(`{subdomain:api-.*}`, `api.tiper.live`, `api.bicstation.com`, `api.avflash.xyz`, `api.bic-saving.com`) || PathPrefix(`/api`, `/admin`, `/static`))"
      - "traefik.http.routers.django-api.priority=6000"
      - "traefik.http.routers.django-api.service=django-svc"
      - "traefik.http.services.django-svc.loadbalancer.server.port=8000"
    volumes:
      - ./django:/usr/src/app
      - ${DATA_ROOT}/django_static:/usr/src/app/staticfiles
    networks:
      - internal-net
      - shared-proxy

  # --- 3. フロントエンド層 (Next.js 艦隊) ---

  # 🏠 Bic Station (メイン)
  next-bicstation-v3:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-bicstation
    container_name: next-bicstation-v3
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=next-bicstation
      - NEXT_PUBLIC_SITE_DOMAIN=bicstation
      - INTERNAL_API_URL=http://django-v3:8000
    extra_hosts:
      - "api-bicstation-host:host-gateway"
    volumes:
      - ./next-bicstation:/usr/src/app
      - ./shared:/usr/src/app/shared
      - /usr/src/app/node_modules
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.bic-router.rule=Host(`bicstation-host`, `bicstation.com`)"
      - "traefik.http.routers.bic-router.priority=2000"
      - "traefik.http.services.bic-svc.loadbalancer.server.port=3000"

  # 🏠 Bic Saving (節約)
  next-bic-saving-v3:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-bic-saving
    container_name: next-bic-saving-v3
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=next-bic-saving
      - NEXT_PUBLIC_SITE_DOMAIN=saving
      - INTERNAL_API_URL=http://django-v3:8000
    extra_hosts:
      - "api-saving-host:host-gateway"
    volumes:
      - ./next-bic-saving:/usr/src/app
      - ./shared:/usr/src/app/shared
      - /usr/src/app/node_modules
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.saving-router.rule=Host(`saving-host`, `bic-saving.com`)"
      - "traefik.http.routers.saving-router.priority=2000"
      - "traefik.http.services.saving-svc.loadbalancer.server.port=3000"

  # 🏠 Tiper (ポータル)
  next-tiper-v3:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-tiper
    container_name: next-tiper-v3
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=next-tiper
      - NEXT_PUBLIC_SITE_DOMAIN=tiper
      - INTERNAL_API_URL=http://django-v3:8000
    extra_hosts:
      - "api-tiper-host:host-gateway"
    volumes:
      - ./next-tiper:/usr/src/app
      - ./shared:/usr/src/app/shared
      - /usr/src/app/node_modules
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.tiper-router.rule=Host(`tiper-host`, `tiper.live`)"
      - "traefik.http.routers.tiper-router.priority=2000"
      - "traefik.http.services.tiper-svc.loadbalancer.server.port=3000"

  # 🏠 AV Flash (アダルト)
  next-avflash-v3:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-avflash
    container_name: next-avflash-v3
    restart: always
    env_file: .env
    environment:
      - PROJECT_NAME=next-avflash
      - NEXT_PUBLIC_SITE_DOMAIN=avflash
      - INTERNAL_API_URL=http://django-v3:8000
    extra_hosts:
      - "api-avflash-host:host-gateway"
    volumes:
      - ./next-avflash:/usr/src/app
      - ./shared:/usr/src/app/shared
      - /usr/src/app/node_modules
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.avflash-router.rule=Host(`avflash-host`, `avflash.xyz`)"
      - "traefik.http.routers.avflash-router.priority=2000"
      - "traefik.http.services.avflash-svc.loadbalancer.server.port=3000"

  # --- 4. 管理・監視ツール ---
  pgadmin-v3:
    image: dpage/pgadmin4
    container_name: pgadmin-v3
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@tiper.live}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin_password_1234}
      PGADMIN_CONFIG_SERVER_MODE: 'false'
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
    networks:
      - shared-proxy
      - internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.pgadmin-router.rule=Host(`pgadmin-host`)"
      - "traefik.http.services.pgadmin-svc.loadbalancer.server.port=80"

  dozzle-v3:
    image: amir20/dozzle:latest
    container_name: dozzle-v3
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - shared-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.dozzle-router.rule=Host(`log-host`)"
      - "traefik.http.services.dozzle-svc.loadbalancer.server.port=8080"

networks:
  internal-net:
    name: "shin-vps_internal-net"
    driver: bridge
  shared-proxy:
    external: true
    name: "shared-proxy"