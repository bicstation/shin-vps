      context: .

      dockerfile: ./shared/docker/NextJS.Dockerfile

      args:
        PROJECT_NAME: next-tiper

        NEXT_PUBLIC_SITE_URL: http://tiper.live:8083

        NEXT_PUBLIC_API_URL: http://api.tiper.live:8083/api

        NEXT_PUBLIC_MEDIA_URL: http://media.tiper.live:8083

