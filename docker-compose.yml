# =====================================================================
# 🛡️ SHIN-VPS v8 [Local Stable - FINAL FIXED]
# =====================================================================
# ■ ローカル基準（完全版）
# ・/api → Django
# ・それ以外 → Next
# ・envは build + runtime 両方に適用（最重要）
# =====================================================================

services:

  # -------------------------
  # 0. Traefik
  # -------------------------
  traefik:
    image: traefik:v2.11
    container_name: traefik-proxy-v3
    restart: always

    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"

    ports:
      - "8083:80"
      - "8085:8080"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

    networks:
      - shared-proxy

  # -------------------------
  # 1. PostgreSQL
  # -------------------------
  postgres-db-v3:
    image: postgres:15-alpine
    container_name: postgres-db-v3
    restart: always

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - internal-net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    shm_size: 256mb

  # -------------------------
  # 2. Django（API）
  # -------------------------
  django-v3:
    build:
      context: .
      dockerfile: ./django/Dockerfile
    container_name: django-v3
    restart: always

    depends_on:
      postgres-db-v3:
        condition: service_healthy

    env_file:
      - .env.local

    command: >
      sh -c "
      python manage.py migrate &&
      gunicorn tiper_api.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      "

    volumes:
      - ./django:/usr/src/app
      - ./django/media:/usr/src/app/media

    networks:
      - internal-net
      - shared-proxy

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.django.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.django.priority=100"
      - "traefik.http.services.django.loadbalancer.server.port=8000"

  # -------------------------
  # 3. Media
  # -------------------------
  nginx-media:
    image: nginx:alpine
    container_name: nginx-media
    restart: always

    volumes:
      - ./django/media:/usr/src/app/media
      - ./nginx/media.conf:/etc/nginx/conf.d/default.conf

    networks:
      - shared-proxy

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.media.rule=PathPrefix(`/media/`)"
      - "traefik.http.services.media.loadbalancer.server.port=80"

  # -------------------------
  # 4. Front（Next.js）
  # -------------------------
  next-bicstation-v3:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-bicstation

        # 🔥 最重要（これがないとCSR壊れる）
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        INTERNAL_API_URL: ${INTERNAL_API_URL}

    container_name: next-bicstation-v3
    restart: always

    # runtime env（SSR用）
    env_file:
      - .env.local

    environment:
      - NEXT_PUBLIC_SITE_DOMAIN=bicstation

    volumes:
      - ./next-bicstation:/usr/src/app
      - ./shared:/usr/src/app/shared
      - /usr/src/app/node_modules

    networks:
      - internal-net
      - shared-proxy

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.front.rule=!PathPrefix(`/api`)"
      - "traefik.http.routers.front.priority=1"
      - "traefik.http.services.front.loadbalancer.server.port=3000"

# -------------------------
# volumes
# -------------------------
volumes:
  postgres_data:

# -------------------------
# networks
# -------------------------
networks:
  internal-net:
    driver: bridge

  shared-proxy:
    external: true