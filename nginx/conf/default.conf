# =====================================================================
# 💡 SHIN-VPS Nginx 統合・最終最適化定義 (ローカル・VPS ハイブリッド対応)
# =====================================================================

server {
    listen 80;
    server_name localhost;
    index index.php index.html index.htm;

    # 大きな画像やインポートを許可
    client_max_body_size 100M;

    # Docker内部のDNSサーバー (コンテナ名の解決に必須)
    resolver 127.0.0.11 valid=30s;

    # --- 0. HTTPS 判定ロジック ---
    set $fastcgi_https "off";
    if ($http_x_forwarded_proto = "https") {
        set $fastcgi_https "on";
    }

    # --- 1. 動的振り分けロジック (Hostヘッダーで判別) ---
    # デフォルト設定
    set $wp_backend "wordpress-gen-v2";
    set $wp_root "/var/www/html/gen";

    # A. 節約ブログ (blog.bic-saving.com)
    # 💡 内部エイリアス nginx-wp-saving を追加
    if ($http_host ~* (blog\.bic-saving\.com|b-saving-host|nginx-wp-saving)) {
        set $wp_backend "wordpress-saving-v2";
        set $wp_root "/var/www/html/saving";
    }

    # B. アダルトブログ (blog.tiper.live)
    # 💡 内部エイリアス nginx-wp-adult を追加
    if ($http_host ~* (blog\.tiper\.live|b-tiper-host|nginx-wp-adult)) {
        set $wp_backend "wordpress-adult-v2";
        set $wp_root "/var/www/html/adult";
    }

    # C. 一般ブログ (blog.bicstation.com)
    # 💡 内部エイリアス nginx-wp-v2 を追加
    if ($http_host ~* (blog\.bicstation\.com|b-bicstation-host|nginx-wp-v2)) {
        set $wp_backend "wordpress-gen-v2";
        set $wp_root "/var/www/html/gen";
    }

    # Nginx自身のドキュメントルートを設定
    root $wp_root;

    # --- 2. Google XML Sitemaps リライト ---
    rewrite ^/sitemap(-+([a-zA-Z0-9_-]+))?\.xml$ "/index.php?xml_sitemap=params=$2" last;
    rewrite ^/sitemap(-+([a-zA-Z0-9_-]+))?\.xml\.gz$ "/index.php?xml_sitemap=params=$2;zip=true" last;
    rewrite ^/sitemap(-+([a-zA-Z0-9_-]+))?\.html$ "/index.php?xml_sitemap=params=$2;html=true" last;
    rewrite ^/sitemap(-+([a-zA-Z0-9_-]+))?\.html\.gz$ "/index.php?xml_sitemap=params=$2;html=true;zip=true" last;

    # --- 3. メインルーティング ---
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # --- 4. PHP-FPM 連携 (ハイブリッド・パス対応) ---
    location ~ \.php$ {
        fastcgi_pass $wp_backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        
        # 【重要】SCRIPT_FILENAME の解決
        # Nginx側のrootがどこであれ、WordPressコンテナ内では常に /var/www/html が基準。
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
        
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTP_HOST $http_host; 
        fastcgi_param HTTPS $fastcgi_https;
        
        fastcgi_read_timeout 300;
        fastcgi_intercept_errors on;
    }

    # --- 5. 静的ファイルキャッシュ ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        log_not_found off;
        access_log off;
    }

    # --- 6. セキュリティ ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}