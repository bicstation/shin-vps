name: SHIN CORE LINX｜Production Deploy

on:
  push:
    tags:
      - 'v*'

jobs:

  deploy:

    runs-on: ubuntu-latest

    timeout-minutes: 90

    env:
      PROJECT_NAME: shin-prod
      DEPLOY_PATH: /home/maya/shin-vps

      BASE_COMPOSE: docker-compose.yml
      PROD_COMPOSE: docker-compose.prod.yml

      ENV_FILE: .env.production

    steps:

      # ==========================================================
      # 📥 Checkout
      # ==========================================================
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ==========================================================
      # 🧹 Cleanup Local Artifacts
      # ==========================================================
      - name: 🧹 Cleanup Unnecessary Files

        run: |

          rm -rf \
            .git \
            .github \
            .venv \
            __pycache__ \
            node_modules \
            .next \
            */node_modules \
            */.next \
            */dist \
            */build

          echo "✅ Cleanup Complete"

      # ==========================================================
      # 🚀 Upload Source
      # ==========================================================
      - name: 🚀 Upload Files to VPS

        uses: appleboy/scp-action@v0.1.7

        with:

          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 2222
          source: "."
          target: "/home/maya/shin-vps"
          strip_components: 0
          overwrite: true

      # ==========================================================
      # 🚀 Production Deploy
      # ==========================================================
      - name: 🚀 Deploy to Production

        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 2222
          command_timeout: 90m

          script: |

            set -e

            cd /home/maya/shin-vps

            echo ""
            echo "=================================================="
            echo "🚀 SHIN CORE LINX｜PRODUCTION DEPLOY"
            echo "=================================================="

            # ==================================================
            # 🌐 Shared Docker Network
            # ==================================================

            echo ""
            echo "🌐 Preparing Shared Network..."

            docker network inspect shared-proxy >/dev/null 2>&1 || \
            docker network create shared-proxy

            echo "✅ Shared Network Ready"

            # ==================================================
            # 🧹 Runtime Cache Cleanup
            # ==================================================

            echo ""
            echo "🧹 Cleaning Runtime Cache..."

            find . -type d -name ".next" \
              ! -path "./postgres_data/*" \
              ! -path "./vps-data/*" \
              -exec rm -rf {} + \
              2>/dev/null || true

            echo "✅ Runtime Cache Cleaned"

            # ==================================================
            # 📦 Docker Build
            # ==================================================

            echo ""
            echo "📦 Building Containers..."

            docker compose \
              -p shin-prod \
              --env-file .env.production \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              build \
              --parallel \
              --no-cache

            echo "✅ Container Build Complete"

            # ==================================================
            # 🚀 Startup
            # ==================================================

            echo ""
            echo "🚀 Starting Containers..."

            docker compose \
              -p shin-prod \
              --env-file .env.production \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d \
              --remove-orphans \
              --wait

            echo "✅ Containers Started"

            # ==================================================
            # 📦 Django Migration
            # ==================================================

            echo ""
            echo "📦 Running Migrations..."

            docker compose \
              -p shin-prod \
              --env-file .env.production \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              exec -T django-v3 \
              python manage.py migrate --noinput

            echo "✅ Migration Complete"

            # ==================================================
            # 🎨 Static Files
            # ==================================================

            echo ""
            echo "🎨 Collecting Static..."

            docker compose \
              -p shin-prod \
              --env-file .env.production \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              exec -T django-v3 \
              python manage.py collectstatic --noinput

            echo "✅ Static Complete"

            # ==================================================
            # 🩺 Health Check
            # ==================================================

            echo ""
            echo "🩺 Running Health Checks..."

            curl -k -f https://api.bicstation.com/admin/ || exit 1

            echo "✅ Django Admin OK"

            # ==================================================
            # 🩺 Health Checks
            # ==================================================

            echo ""
            echo "🩺 Running Health Checks..."

            curl -fsS https://api.bicstation.com/admin/ > /dev/null
            echo "✅ Django Admin OK"

            curl -fsS https://tiper.live/ > /dev/null
            echo "✅ Tiper OK"

            curl -fsS https://avflash.xyz/ > /dev/null
            echo "✅ AVFLASH OK"

            curl -fsS https://bicstation.com/ > /dev/null
            echo "✅ BICSTATION OK"

            curl -fsS https://bic-saving.com/ > /dev/null
            echo "✅ BIC SAVING OK"



            # ==================================================
            # 📊 Container Status
            # ==================================================

            echo ""
            echo "📊 Container Status"

            docker compose \
              -p shin-prod \
              --env-file .env.production \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              ps


            # ==================================================
            # 📄 Runtime Logs
            # ==================================================

            echo ""
            echo "📄 Django Logs"

            docker compose \
              -p shin-prod \
              --env-file .env.production \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              logs --tail=20 django-v3 || true

            echo ""
            echo "📄 Next.js Logs"

            docker compose \
              -p shin-prod \
              --env-file .env.production \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              logs --tail=20 shoin-prod-next-bicstation-v3-1 || true

            echo ""
            echo "📄 Traefik Logs"

            docker compose \
              -p shin-prod \
              --env-file .env.production \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              logs --tail=20 traefik || true

            # ==================================================
            # 🧹 Docker Cleanup
            # ==================================================

            # echo ""
            # echo "🧹 Docker Cleanup"
            # docker image prune -af || true
            # docker builder prune -af || true
            # docker container prune -f || true
            # echo "✅ Cleanup Complete"

            # ==================================================
            # 🎉 Done
            # ==================================================

            echo ""
            echo "=================================================="
            echo "✅ SHIN CORE LINX DEPLOY SUCCESS"
            echo "=================================================="ontainer Status
            echo ""