# /home/maya/shin-vps/docker-compose.sim.yml

# =====================================================================
# 🚀 SHIN-VPS v8 SIMULATION FINAL STABLE
# 🚀 SHIN CORE LINX｜LOCAL PRODUCTION SIMULATION
# =====================================================================
#
# ■ ローカル本番シミュレーション専用
#
# ・4ドメイン本番導線検証
# ・Frontend / API / Media 分離
# ・Traefik Domain Routing
# ・HTTP Local Simulation
# ・hosts ベース routing
# ・production-like semantic infrastructure
#
# ■ Windows + WSL2 + Docker Desktop 安定版
#
# ・8083 → frontend/http routing
# ・8085 → traefik dashboard
#
# ⚠️ HTTPS / Let's Encrypt は使用しない
# ⚠️ local hosts simulation 専用
#
# =====================================================================

services:

  # -------------------------------------------------------------------
  # 0. Traefik
  # -------------------------------------------------------------------
  traefik:
    image: traefik:v2.11

    container_name: traefik-proxy-sim

    restart: always

    command:
      - "--api.dashboard=true"

      - "--providers.docker=true"

      - "--providers.docker.exposedbydefault=false"

      - "--providers.docker.network=shared-proxy"

      # ---------------------------------------------------------------
      # HTTP ONLY
      # ---------------------------------------------------------------
      - "--entrypoints.web.address=:80"

    ports:
      # ===============================================================
      # Windows / WSL Stable Routing
      # ===============================================================
      - "8083:80"

      # ===============================================================
      # Traefik Dashboard
      # ===============================================================
      - "8085:8080"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

    networks:
      - shared-proxy

  # -------------------------------------------------------------------
  # 1. PostgreSQL
  # -------------------------------------------------------------------
  postgres-db-v3:
    image: postgres:15-alpine

    container_name: postgres-db-v3

    restart: always

    environment:
      POSTGRES_USER: ${DB_USER}

      POSTGRES_PASSWORD: ${DB_PASSWORD}

      POSTGRES_DB: ${DB_NAME}

    volumes:
      - postgres_data_sim:/var/lib/postgresql/data

    networks:
      - internal-net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]

      interval: 10s

      timeout: 5s

      retries: 5

    shm_size: 256mb

  # -------------------------------------------------------------------
  # 2. Django Semantic Backend
  # -------------------------------------------------------------------
  django-v3:
    build:
      context: .

      dockerfile: ./django/Dockerfile

    container_name: django-v3

    restart: always

    depends_on:
      postgres-db-v3:
        condition: service_healthy

    env_file:
      - .env.production

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn tiper_api.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      "

    volumes:
      - ./django:/usr/src/app

      - ./django/media:/usr/src/app/media

    networks:
      - internal-net

      - shared-proxy

    labels:
      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      # ===============================================================
      # API DOMAIN ROUTING
      # ===============================================================
      - 'traefik.http.routers.api.rule=Host("api.bicstation.com","api.bic-saving.com","api.tiper.live","api.avflash.xyz")'

      - "traefik.http.routers.api.entrypoints=web"

      - "traefik.http.routers.api.priority=3000"

      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # -------------------------------------------------------------------
  # 3. Media CDN Layer
  # -------------------------------------------------------------------
  nginx-media:
    image: nginx:alpine

    container_name: nginx-media

    restart: always

    volumes:
      - ./django/media:/usr/src/app/media

      - ./nginx/media.conf:/etc/nginx/conf.d/default.conf

    networks:
      - shared-proxy

    labels:
      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      # ===============================================================
      # MEDIA DOMAIN ROUTING
      # ===============================================================
      - 'traefik.http.routers.media.rule=Host("media.bicstation.com","media.bic-saving.com","media.tiper.live","media.avflash.xyz")'

      - "traefik.http.routers.media.entrypoints=web"

      - "traefik.http.routers.media.priority=2500"

      - "traefik.http.services.media.loadbalancer.server.port=80"

  # -------------------------------------------------------------------
  # 4. Bicstation Frontend
  # -------------------------------------------------------------------
  next-bicstation-v3:
    build:
      context: .

      dockerfile: ./shared/docker/NextJS.Dockerfile

      args:
        PROJECT_NAME: next-bicstation

        NEXT_PUBLIC_SITE_URL: http://bicstation.com:8083

        NEXT_PUBLIC_API_URL: http://api.bicstation.com:8083/api

        NEXT_PUBLIC_MEDIA_URL: http://media.bicstation.com:8083

        INTERNAL_API_URL: http://django-v3:8000/api

    container_name: next-bicstation-v3

    restart: always

    env_file:
      - .env.production

    environment:
      NEXT_PUBLIC_SITE_DOMAIN: bicstation.com

      NEXT_PUBLIC_SITE_URL: http://bicstation.com:8083

      NEXT_PUBLIC_API_URL: http://api.bicstation.com:8083/api

      NEXT_PUBLIC_MEDIA_URL: http://media.bicstation.com:8083

      INTERNAL_API_URL: http://django-v3:8000/api

    networks:
      - internal-net

      - shared-proxy

    labels:
      - "traefik.enable=true"

      - "traefik.docker.network=shared-proxy"

      - 'traefik.http.routers.bicstation.rule=Host("bicstation.com")'

      - "traefik.http.routers.bicstation.entrypoints=web"

      - "traefik.http.routers.bicstation.priority=100"

      - "traefik.http.services.bicstation.loadbalancer.server.port=3000"

  # -------------------------------------------------------------------
