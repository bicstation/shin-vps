      NEXT_PUBLIC_SITE_DOMAIN: bic-saving.com

      NEXT_PUBLIC_SITE_URL: http://bic-saving.com:8083

      NEXT_PUBLIC_API_URL: http://api.bic-saving.com:8083/api

