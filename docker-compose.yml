# =====================================================================
# 💡 SHIN-VPS 統合環境構成定義 (docker-compose.yml) - 2026 最終安定版
# ---------------------------------------------------------------------
# 【修正済ポイント】
# 1. リアルタイム実装時のポート競合（8000番の重複）を完全に解消。
# 2. Traefikネットワークを "shared-proxy" として厳密に固定。
# 3. Djangoのルーティングを PathPrefix 優先にし、管理画面へのアクセスを死守。
# 4. Next.js の環境変数を整理し、バックエンドへの内部通信を最適化。
# 5. Dozzleの権限・ストリーミング通信設定を最適化。
# =====================================================================

services:

  # --- 0. Traefik (エッジプロキシ / ゲートウェイ) ---
  traefik:
    image: traefik:v2.11
    container_name: traefik-proxy
    restart: always
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--log.level=DEBUG"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.network=shared-proxy"
      - "--providers.docker.watch=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "8083:80"     # HTTPメイン窓口
      - "8085:8080"   # Traefik ダッシュボード
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - shared-proxy

  # --- 1. データベース層 ---
  mariadb-v2:
    image: mariadb:10
    container_name: mariadb-v2
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${WP_GEN_DB_NAME}
    volumes:
      - ../vps-data/mariadb:/var/lib/mysql
    networks:
      - internal-net

  postgres-db-v2:
    image: postgres:15-alpine
    container_name: postgres-db-v2
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ../vps-data/postgres:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 2. バックエンド層 (Django API) ---
  django-v2:
    build:
      context: ./django
    container_name: django-v2
    restart: always
    depends_on:
      postgres-db-v2:
        condition: service_healthy
    env_file: .env
    environment:
      - DB_HOST=postgres-db-v2
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_KEY_1=${GEMINI_API_KEY_1}
      - GEMINI_API_KEY_2=${GEMINI_API_KEY_2}
      - GEMINI_API_KEY_3=${GEMINI_API_KEY_3}
      - GEMINI_API_KEY_4=${GEMINI_API_KEY_4}
      - GEMINI_API_KEY_5=${GEMINI_API_KEY_5}
      - GEMINI_API_KEY_6=${GEMINI_API_KEY_6}
      - GEMINI_API_KEY_7=${GEMINI_API_KEY_7}
      - GEMINI_API_KEY_8=${GEMINI_API_KEY_8}
      - GEMINI_API_KEY_9=${GEMINI_API_KEY_9}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.django-router.priority=200"
      - "traefik.http.routers.django-router.rule=PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/static`)"
      - "traefik.http.services.django-svc.loadbalancer.server.port=8000"
    volumes:
      - ./django:/usr/src/app
      - ../vps-data/django_static:/usr/src/app/staticfiles
    networks:
      - internal-net
      - shared-proxy

  # --- 3. フロントエンド層 (Next.js) ---
  next-bicstation-v2:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-bicstation
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: next-bicstation-v2
    restart: always
    env_file: .env
    environment:
      - API_INTERNAL_URL=http://django-v2:8000/api
    volumes:
      - ./next-bicstation:/usr/src/app
      - ./shared:/usr/src/app/shared
    networks:
      - internal-net
      - shared-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.bic-router.rule=Host(`bicstation-host`)"
      - "traefik.http.services.bic-svc.loadbalancer.server.port=3000"

  next-tiper-v2:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-tiper
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: next-tiper-v2
    restart: always
    env_file: .env
    environment:
      - API_INTERNAL_URL=http://django-v2:8000/api
    volumes:
      - ./next-tiper:/usr/src/app
      - ./shared:/usr/src/app/shared
    networks:
      - internal-net
      - shared-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.tiper-router.rule=Host(`tiper-host`)"
      - "traefik.http.services.tiper-svc.loadbalancer.server.port=3000"

  next-bic-saving-v2:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-bic-saving
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: next-bic-saving-v2
    restart: always
    env_file: .env
    environment:
      - API_INTERNAL_URL=http://django-v2:8000/api
    volumes:
      - ./next-bic-saving:/usr/src/app
      - ./shared:/usr/src/app/shared
    networks:
      - internal-net
      - shared-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.saving-router.rule=Host(`saving-host`)"
      - "traefik.http.services.saving-svc.loadbalancer.server.port=3000"

  next-avflash-v2:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args:
        PROJECT_NAME: next-avflash
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: next-avflash-v2
    restart: always
    env_file: .env
    environment:
      - API_INTERNAL_URL=http://django-v2:8000/api
    volumes:
      - ./next-avflash:/usr/src/app
      - ./shared:/usr/src/app/shared
    networks:
      - internal-net
      - shared-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.avflash-router.rule=Host(`avflash-host`)"
      - "traefik.http.services.avflash-svc.loadbalancer.server.port=3000"

  # --- 4. WordPress & Nginx ---
  nginx-wp-v2:
    image: nginx:alpine
    container_name: nginx-wp-v2
    restart: always
    volumes:
      - ../vps-data/wordpress-gen:/var/www/html/gen:ro
      - ../vps-data/wordpress-saving:/var/www/html/saving:ro
      - ../vps-data/wordpress-adult:/var/www/html/adult:ro
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - internal-net
      - shared-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.blog-gen.rule=Host(`b-bicstation-host`)"
      - "traefik.http.routers.blog-saving.rule=Host(`b-saving-host`)"
      - "traefik.http.routers.blog-adult.rule=Host(`b-tiper-host`)"
      - "traefik.http.services.nginx-wp-svc.loadbalancer.server.port=80"

  wordpress-gen:
    image: wordpress:6-fpm-alpine
    container_name: wordpress-gen-v2
    restart: always
    environment:
      WORDPRESS_DB_HOST: mariadb-v2
      WORDPRESS_DB_NAME: ${WP_GEN_DB_NAME}
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: ${WP_DB_ROOT_PASSWORD}
    volumes:
      - ../vps-data/wordpress-gen:/var/www/html
    networks:
      - internal-net

  wordpress-saving:
    image: wordpress:6-fpm-alpine
    container_name: wordpress-saving-v2
    restart: always
    environment:
      WORDPRESS_DB_HOST: mariadb-v2
      WORDPRESS_DB_NAME: ${WP_SAVING_DB_NAME}
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: ${WP_DB_ROOT_PASSWORD}
    volumes:
      - ../vps-data/wordpress-saving:/var/www/html
    networks:
      - internal-net

  wordpress-adult:
    image: wordpress:6-fpm-alpine
    container_name: wordpress-adult-v2
    restart: always
    environment:
      WORDPRESS_DB_HOST: mariadb-v2
      WORDPRESS_DB_NAME: ${WP_ADULT_DB_NAME}
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: ${WP_DB_ROOT_PASSWORD}
    volumes:
      - ../vps-data/wordpress-adult:/var/www/html
    networks:
      - internal-net

  # --- 5. 管理ツール層 ---
  phpmyadmin-v2:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin-v2
    environment:
      PMA_HOST: mariadb-v2
      PMA_ABSOLUTE_URI: http://phpmyadmin-host:8083/
    networks:
      - internal-net
      - shared-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.pma-router.rule=Host(`phpmyadmin-host`)"
      - "traefik.http.services.pma-svc.loadbalancer.server.port=80"

  pgadmin-v2:
    image: dpage/pgadmin4
    container_name: pgadmin-v2
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    networks:
      - internal-net
      - shared-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.pgadmin-router.rule=Host(`pgadmin-host`)"
      - "traefik.http.services.pgadmin-svc.loadbalancer.server.port=80"

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    # 🛡️ 特権モード: Dockerソケットへのアクセス権限を確実に確保
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - shared-proxy
    environment:
      - DOZZLE_LEVEL=info
      - DOZZLE_NO_ANALYTICS=true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.dozzle-router.rule=Host(`log-host`)"
      - "traefik.http.services.dozzle-svc.loadbalancer.server.port=8080"
      
      # 🚀 ストリーミング通信（WebSocket）を安定させるための追加設定
      - "traefik.http.routers.dozzle-router.entrypoints=web"
      - "traefik.http.middlewares.dozzle-stripprefix.stripprefix.prefixes=/dozzle"

# --- ネットワーク定義 ---
networks:
  internal-net:
    driver: bridge
  shared-proxy:
    driver: bridge
    name: "shared-proxy" # 🚨 名前を外部に固定

volumes:
  static_volume_home: