# =====================================================================
# 🚀 SHIN-VPS v3 Next.js & Django 統合・AI特化型定義 (完全版)
# =====================================================================

services:
  # --- 0. Traefik (管制塔) ---
  traefik:
    image: traefik:v2.11
    container_name: traefik-proxy-v3
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "8083:80"
      - "8085:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - shared-proxy

  # --- 1. データベース層 ---
  postgres-db-v3:
    image: postgres:15-alpine
    container_name: postgres-db-v3
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 2. バックエンド層 (Django: AI記事生成・管理) ---
  django-v3:
    build: ./django
    container_name: django-v3
    restart: always
    depends_on:
      postgres-db-v3:
        condition: service_healthy
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django-router.priority=3000"
      - "traefik.http.routers.django-router.rule=Host(`api-tiper-host`) || (Host(`tiper-host`, `bicstation-host`, `saving-host`, `avflash-host`) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/static`)))"
      - "traefik.http.services.django-svc.loadbalancer.server.port=8000"
    volumes:
      - ./django:/usr/src/app
      - ${DATA_ROOT}/django_static:/usr/src/app/staticfiles
    networks:
      - internal-net
      - shared-proxy

  # --- 3. フロントエンド層 (Next.js 4サイト) ---
  # ビルド時にAPIキーを注入し、AIコンテンツの生成・取得を可能にします
  next-bicstation-v3:
    build: 
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args: 
        PROJECT_NAME: next-bicstation
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
        GEMINI_API_KEY_1: "${GEMINI_API_KEY_1}"
        GEMINI_API_KEY_2: "${GEMINI_API_KEY_2}"
    container_name: next-bicstation-v3
    restart: always
    env_file: .env
    networks: [shared-proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bic-router.rule=Host(`bicstation-host`)"
      - "traefik.http.services.bic-svc.loadbalancer.server.port=3000"

  next-tiper-v3:
    build: 
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args: 
        PROJECT_NAME: next-tiper
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
        GEMINI_API_KEY_3: "${GEMINI_API_KEY_3}"
        GEMINI_API_KEY_4: "${GEMINI_API_KEY_4}"
    container_name: next-tiper-v3
    restart: always
    env_file: .env
    networks: [shared-proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tiper-router.rule=Host(`tiper-host`)"
      - "traefik.http.services.tiper-svc.loadbalancer.server.port=3000"

  next-bic-saving-v3:
    build: 
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args: 
        PROJECT_NAME: next-bic-saving
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
        GEMINI_API_KEY_5: "${GEMINI_API_KEY_5}"
        GEMINI_API_KEY_6: "${GEMINI_API_KEY_6}"
    container_name: next-bic-saving-v3
    restart: always
    env_file: .env
    networks: [shared-proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.saving-router.rule=Host(`saving-host`)"
      - "traefik.http.services.saving-svc.loadbalancer.server.port=3000"

  next-avflash-v3:
    build: 
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile
      args: 
        PROJECT_NAME: next-avflash
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
        GEMINI_API_KEY_7: "${GEMINI_API_KEY_7}"
        GEMINI_API_KEY_8: "${GEMINI_API_KEY_8}"
    container_name: next-avflash-v3
    restart: always
    env_file: .env
    networks: [shared-proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.avflash-router.rule=Host(`avflash-host`)"
      - "traefik.http.services.avflash-svc.loadbalancer.server.port=3000"

  # --- 4. 管理・監視ツール ---
  pgadmin-v3:
    image: dpage/pgadmin4
    container_name: pgadmin-v3
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT: 80
    networks: [shared-proxy, internal-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin-router.rule=Host(`pgadmin-host`)"
      - "traefik.http.services.pgadmin-svc.loadbalancer.server.port=80"

  dozzle-v3:
    image: amir20/dozzle:latest
    container_name: dozzle-v3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [shared-proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle-router.rule=Host(`log-host`)"
      - "traefik.http.services.dozzle-svc.loadbalancer.server.port=8080"

networks:
  internal-net:
    name: "shin-vps_internal-net"
  shared-proxy:
    external: true
    name: "shared-proxy"