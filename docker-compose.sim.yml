  # -------------------------------------------------------------------
  next-avflash-v3:
    build:
      context: .

      dockerfile: ./shared/docker/NextJS.Dockerfile

      args:
        PROJECT_NAME: next-avflash

        NEXT_PUBLIC_SITE_URL: http://avflash.xyz:8083

        NEXT_PUBLIC_API_URL: http://api.avflash.xyz:8083/api

        NEXT_PUBLIC_MEDIA_URL: http://media.avflash.xyz:8083

        INTERNAL_API_URL: http://django-v3:8000/api

    container_name: next-avflash-v3

    restart: always

    env_file:
      - .env.production

    environment:
      NEXT_PUBLIC_SITE_DOMAIN: avflash.xyz

      NEXT_PUBLIC_SITE_URL: http://avflash.xyz:8083

