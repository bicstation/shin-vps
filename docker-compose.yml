# =====================================================================
# 🚀 SHIN-VPS 統合環境構成定義 - 2026 最終安定・完全版
# =====================================================================

services:

  # --- 0. Traefik (エッジプロキシ / 全通信の管制塔) ---
  traefik:
    image: traefik:v2.11
    container_name: traefik-proxy
    restart: always
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.network=shared-proxy"
      - "--entrypoints.web.address=:80"
    ports:
      - "8083:80"     # HTTPアクセス用 (http://log-host:8083 等)
      - "8085:8080"   # Traefikダッシュボード (http://localhost:8085)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - shared-proxy

  # --- 1. データベース層 (MariaDB & Postgres) ---
  mariadb-v2:
    image: mariadb:10
    container_name: mariadb-v2
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${WP_GEN_DB_NAME}
    volumes:
      - ${MARIADB_DATA_PATH}:/var/lib/mysql
    networks:
      - internal-net

  postgres-db-v2:
    image: postgres:15-alpine
    container_name: postgres-db-v2
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 2. バックエンド層 (Django API / Admin) ---
  django-v2:
    build: ./django
    container_name: django-v2
    restart: always
    depends_on:
      postgres-db-v2:
        condition: service_healthy
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.django-router.rule=Host(`api-tiper-host`)"
      - "traefik.http.routers.django-router.priority=2000"
      - "traefik.http.services.django-svc.loadbalancer.server.port=8000"
    volumes:
      - ./django:/usr/src/app
      - ${WP_DATA_PATH}/django_static:/usr/src/app/staticfiles
    networks:
      - internal-net
      - shared-proxy

  # --- 3. フロントエンド層 (Next.js 4サイト) ---
  next-bicstation-v2:
    build: { context: ., dockerfile: ./shared/docker/NextJS.Dockerfile, args: { PROJECT_NAME: next-bicstation, NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}" } }
    container_name: next-bicstation-v2
    restart: always
    env_file: .env
    networks: [internal-net, shared-proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.bic-router.rule=Host(`bicstation-host`)"
      - "traefik.http.services.bic-svc.loadbalancer.server.port=3000"

  next-tiper-v2:
    build: { context: ., dockerfile: ./shared/docker/NextJS.Dockerfile, args: { PROJECT_NAME: next-tiper, NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}" } }
    container_name: next-tiper-v2
    restart: always
    env_file: .env
    networks: [internal-net, shared-proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.tiper-router.rule=Host(`tiper-host`)"
      - "traefik.http.services.tiper-svc.loadbalancer.server.port=3000"

  next-bic-saving-v2:
    build: { context: ., dockerfile: ./shared/docker/NextJS.Dockerfile, args: { PROJECT_NAME: next-bic-saving, NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}" } }
    container_name: next-bic-saving-v2
    restart: always
    env_file: .env
    networks: [internal-net, shared-proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.saving-router.rule=Host(`saving-host`)"
      - "traefik.http.services.saving-svc.loadbalancer.server.port=3000"

  next-avflash-v2:
    build: { context: ., dockerfile: ./shared/docker/NextJS.Dockerfile, args: { PROJECT_NAME: next-avflash, NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}" } }
    container_name: next-avflash-v2
    restart: always
    env_file: .env
    networks: [internal-net, shared-proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.avflash-router.rule=Host(`avflash-host`)"
      - "traefik.http.services.avflash-svc.loadbalancer.server.port=3000"

  # --- 4. WordPress 配信層 (Nginx + 4 FPM) ---
  nginx-wp-v2:
    image: nginx:alpine
    container_name: nginx-wp-v2
    restart: always
    volumes:
      - ${WP_DATA_PATH}/wordpress-gen:/var/www/html/gen:ro
      - ${WP_DATA_PATH}/wordpress-saving:/var/www/html/saving:ro
      - ${WP_DATA_PATH}/wordpress-adult:/var/www/html/adult:ro
      - ${WP_DATA_PATH}/wordpress-avflash:/var/www/html/avflash:ro
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - internal-net
      - shared-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.blog-router.rule=Host(`b-bicstation-host`) || Host(`b-saving-host`) || Host(`b-tiper-host`) || Host(`b-avflash-host`)"
      - "traefik.http.services.nginx-wp-svc.loadbalancer.server.port=80"

  wordpress-gen:
    image: wordpress:6-fpm-alpine
    container_name: wordpress-gen-v2
    restart: always
    environment:
      WORDPRESS_DB_HOST: mariadb-v2
      WORDPRESS_DB_NAME: ${WP_GEN_DB_NAME}
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: ${WP_DB_ROOT_PASSWORD}
    volumes:
      - ${WP_DATA_PATH}/wordpress-gen:/var/www/html
    networks:
      - internal-net

  wordpress-saving:
    image: wordpress:6-fpm-alpine
    container_name: wordpress-saving-v2
    restart: always
    environment:
      WORDPRESS_DB_HOST: mariadb-v2
      WORDPRESS_DB_NAME: ${WP_SAVING_DB_NAME}
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: ${WP_DB_ROOT_PASSWORD}
    volumes:
      - ${WP_DATA_PATH}/wordpress-saving:/var/www/html
    networks:
      - internal-net

  wordpress-adult:
    image: wordpress:6-fpm-alpine
    container_name: wordpress-adult-v2
    restart: always
    environment:
      WORDPRESS_DB_HOST: mariadb-v2
      WORDPRESS_DB_NAME: ${WP_ADULT_DB_NAME}
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: ${WP_DB_ROOT_PASSWORD}
    volumes:
      - ${WP_DATA_PATH}/wordpress-adult:/var/www/html
    networks:
      - internal-net

  wordpress-avflash:
    image: wordpress:6-fpm-alpine
    container_name: wordpress-avflash-v2
    restart: always
    environment:
      WORDPRESS_DB_HOST: mariadb-v2
      WORDPRESS_DB_NAME: ${WP_AVFLASH_DB_NAME}
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: ${WP_DB_ROOT_PASSWORD}
    volumes:
      - ${WP_DATA_PATH}/wordpress-avflash:/var/www/html
    networks:
      - internal-net

  # --- 5. 管理ツール層 (phpMyAdmin, pgAdmin, Dozzle) ---
  phpmyadmin-v2:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin-v2
    environment:
      PMA_HOST: mariadb-v2
      # Traefikが8083で受けるため、リダイレクト先を整合させる
      PMA_ABSOLUTE_URI: http://phpmyadmin-host:8083/
    networks:
      - internal-net
      - shared-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.pma-router-final.rule=Host(`phpmyadmin-host`)"
      - "traefik.http.services.pma-svc-final.loadbalancer.server.port=80"

  pgadmin-v2:
    image: dpage/pgadmin4
    container_name: pgadmin-v2
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
    networks:
      - internal-net
      - shared-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.pgadmin-router-final.rule=Host(`pgadmin-host`)"
      - "traefik.http.services.pgadmin-svc-final.loadbalancer.server.port=80"

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - shared-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"
      - "traefik.http.routers.dozzle-router-final.rule=Host(`log-host`)"
      - "traefik.http.services.dozzle-svc-final.loadbalancer.server.port=8080"

# --- 共通定義 ---
networks:
  internal-net:
    driver: bridge
  shared-proxy:
    external: true

volumes:
  static_volume_home:
  wordpress_data_home:    # これを追加
  postgres_data_home:     # これを追加
  mariadb_data_home:      # これも必要かもしれません（エラーに出ていれば追加）