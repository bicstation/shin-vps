# ==============================================================================
# 🚀 SHIN CORE LINX｜Production Docker Compose
# ==============================================================================

version: "3.9"

services:

  # ===========================================================================
  # 1. PostgreSQL (Persistent, Production)
  # ===========================================================================
  postgres-db-v3:
    image: postgres:15-alpine
    container_name: postgres-db-v3
    restart: always
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - /home/maya/docker_volumes/postgres:/var/lib/postgresql/data
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      retries: 5
      timeout: 5s

  # ===========================================================================
  # 2. Django API
  # ===========================================================================
  django-v3:
    build:
      context: ./django
      dockerfile: Dockerfile
    container_name: django-v3
    restart: always
    env_file:
      - .env.production
    depends_on:
      postgres-db-v3:
        condition: service_healthy
    networks:
      - shared-proxy
    volumes:
      - ./django:/usr/src/app
      - ./django/media:/usr/src/app/media
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn tiper_api.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      "

  # ===========================================================================
  # 3. Next.js Frontends
  # ===========================================================================
  next-bicstation-v3:
    build:
      context: ./next-bicstation
      dockerfile: Dockerfile
    container_name: next-bicstation-v3
    restart: always
    env_file:
      - .env.production
    depends_on:
      - django-v3
    networks:
      - shared-proxy
    ports:
      - "3000:3000"

  next-bic-saving-v3:
    build:
      context: ./next-bic-saving
      dockerfile: Dockerfile
    container_name: next-bic-saving-v3
    restart: always
    env_file:
      - .env.production
    depends_on:
      - django-v3
    networks:
      - shared-proxy
    ports:
      - "3001:3000"

  next-tiper-v3:
    build:
      context: ./next-tiper
      dockerfile: Dockerfile
    container_name: next-tiper-v3
    restart: always
    env_file:
      - .env.production
    depends_on:
      - django-v3
    networks:
      - shared-proxy
    ports:
      - "3002:3000"

  next-avflash-v3:
    build:
      context: ./next-avflash
      dockerfile: Dockerfile
    container_name: next-avflash-v3
    restart: always
    env_file:
      - .env.production
    depends_on:
      - django-v3
    networks:
      - shared-proxy
    ports:
      - "3003:3000"

  # ===========================================================================
  # 4. Media / Static Files Proxy
  # ===========================================================================
  nginx-media:
    image: nginx:alpine
    container_name: nginx-media
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./django/media:/usr/src/app/media
    networks:
      - shared-proxy

  # ===========================================================================
  # 5. Traefik Reverse Proxy
  # ===========================================================================
  traefik-proxy:
    image: traefik:v2.11
    container_name: traefik-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - shared-proxy

# ===========================================================================
# 6. Volumes
# ===========================================================================
volumes:
  postgres_data_prod:

# ===========================================================================
# 7. Networks
# ===========================================================================
networks:
  shared-proxy:
    external: true