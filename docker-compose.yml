# /home/maya/shin-vps/docker-compose.yml
# =====================================================================
# 🚀 SHIN-VPS v8 FINAL STABLE
# 🚀 4 DOMAIN + MONOREPO + SHARED SEMANTIC LAYER
# =====================================================================

services:

  # -------------------------------------------------------------------
  # 0. Traefik
  # -------------------------------------------------------------------
  traefik:
    image: traefik:v2.11
    container_name: traefik-proxy-v3
    restart: always

    command:
      - "--api.dashboard=true"

      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=shared-proxy"

      - "--entrypoints.web.address=:80"
      - "--entrypoints.dashboard.address=:8080"

    ports:
      - "8083:80"
      - "8085:8080"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

    networks:
      - shared-proxy

  # -------------------------------------------------------------------
  # 1. PostgreSQL
  # -------------------------------------------------------------------
  postgres-db-v3:
    image: postgres:15-alpine
    container_name: postgres-db-v3
    restart: always

    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-postgres}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - internal-net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    shm_size: 256mb

  # -------------------------------------------------------------------
  # 2. Django API
  # -------------------------------------------------------------------
  django-v3:
    build:
      context: .
      dockerfile: ./django/Dockerfile

    container_name: django-v3
    restart: always

    depends_on:
      postgres-db-v3:
        condition: service_healthy

    env_file:
      - .env.local

    command: >
      sh -c "
      python manage.py migrate &&
      gunicorn tiper_api.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      "

    volumes:
      - ./django:/usr/src/app
      - ./django/media:/usr/src/app/media

    networks:
      - internal-net
      - shared-proxy

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"

      - "traefik.http.routers.django.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.django.entrypoints=web"

      - "traefik.http.services.django.loadbalancer.server.port=8000"

  # -------------------------------------------------------------------
  # 3. Media
  # -------------------------------------------------------------------
  nginx-media:
    image: nginx:alpine
    container_name: nginx-media
    restart: always

    volumes:
      - ./django/media:/usr/src/app/media
      - ./nginx/media.conf:/etc/nginx/conf.d/default.conf

    networks:
      - shared-proxy

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.media.rule=PathPrefix(`/media/`)"
      - "traefik.http.routers.media.entrypoints=web"

      - "traefik.http.services.media.loadbalancer.server.port=80"

  # -------------------------------------------------------------------
  # 4. Frontend Layer
  # -------------------------------------------------------------------

  # =========================================================
  # bicstation
  # =========================================================
  next-bicstation-v3:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile

      args:
        PROJECT_NAME: next-bicstation

        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://bicstation-host:8083/api}

        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://django-v3:8000/api}

    container_name: next-bicstation-v3
    restart: always

    env_file:
      - .env.local

    environment:
      NEXT_PUBLIC_SITE_DOMAIN: bicstation-host

      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://bicstation-host:8083/api}

      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://django-v3:8000/api}

    networks:
      - internal-net
      - shared-proxy

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"

      - "traefik.http.routers.bicstation.rule=Host(`bicstation-host`)"
      - "traefik.http.routers.bicstation.entrypoints=web"

      - "traefik.http.services.bicstation.loadbalancer.server.port=3000"

  # =========================================================
  # saving
  # =========================================================
  next-bic-saving-v3:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile

      args:
        PROJECT_NAME: next-bic-saving

        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://saving-host:8083/api}

        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://django-v3:8000/api}

    container_name: next-bic-saving-v3
    restart: always

    env_file:
      - .env.local

    environment:
      NEXT_PUBLIC_SITE_DOMAIN: saving-host

      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://saving-host:8083/api}

      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://django-v3:8000/api}

    networks:
      - internal-net
      - shared-proxy

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=shared-proxy"

      - "traefik.http.routers.saving.rule=Host(`saving-host`)"
      - "traefik.http.routers.saving.entrypoints=web"

      - "traefik.http.services.saving.loadbalancer.server.port=3000"

  # =========================================================
  # tiper
  # =========================================================
  next-tiper-v3:
    build:
      context: .
      dockerfile: ./shared/docker/NextJS.Dockerfile

      args:
        PROJECT_NAME: next-tiper

        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://tiper-host:8083/api}

        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://django-v3:8000/api}

    container_name: next-tiper-v3
    restart: always

    env_file:
      - .env.local

    environment:
      NEXT_PUBLIC_SITE_DOMAIN: tiper-host

      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://tiper-host:8083/api}

      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://django-v3:8000/api}

